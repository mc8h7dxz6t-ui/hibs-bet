<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle background -->
  <circle cx="100" cy="100" r="95" fill="#1a472a" stroke="#ffd700" stroke-width="4"/>
  
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="85" fill="#2d5a3d"/>
  
  <!-- Vertical stripe (brown) -->
  <rect x="60" y="30" width="20" height="140" fill="#8B4513"/>
  
  <!-- Vertical stripe (yellow) -->
  <rect x="120" y="30" width="20" height="140" fill="#FFD700"/>
  
  <!-- Shield shape -->
  <path d="M 100 50 L 140 75 L 140 115 Q 100 150 100 150 Q 60 150 60 115 L 60 75 Z" 
        fill="none" stroke="#FFD700" stroke-width="2"/>
  
  <!-- H monogram -->
  <text x="100" y="125" font-size="48" font-weight="bold" text-anchor="middle" fill="#FFD700" font-family="Georgia">H</text>
  
  <!-- Text: HIBERNIAN -->
  <path id="topCurve" d="M 40 100 A 60 60 0 0 1 160 100" fill="none"/>
  <text font-size="14" font-weight="bold" fill="#FFD700" font-family="Georgia" letter-spacing="2">
    <textPath href="#topCurve" startOffset="50%" text-anchor="middle">
      HIBERNIAN
    </textPath>
  </text>
  
  <!-- Text: EST 1875 -->
  <text x="100" y="172" font-size="10" text-anchor="middle" fill="#FFD700" font-family="Georgia" font-weight="bold">EST 1875</text>
</svg>

<button type="button" class="hibs-assistant-fab" id="hibs-assistant-fab" title="Betting Assistant" aria-label="Open betting assistant"><img src="{{ url_for('static', filename=hibs_badge_harp) }}" alt="" width="52" height="52" decoding="async"></button>
<div class="hibs-assistant-panel" id="hibs-assistant-panel" role="dialog" aria-label="Betting Assistant">
    <div class="hibs-assistant-hd">
        <strong><img src="{{ url_for('static', filename=hibs_badge_primary) }}" alt="" width="20" height="20" style="vertical-align:-4px;margin-right:6px;border-radius:4px;">hibs Assistant</strong>
        <button type="button" class="hibs-assistant-close" id="hibs-assistant-close" aria-label="Close">×</button>
    </div>
    <div class="hibs-assistant-body" id="hibs-assistant-body"></div>
    <div class="hibs-assistant-controls">
        <input type="hidden" id="hibs-assistant-fixture" value="">
        <form class="hibs-assistant-compose" id="hibs-assistant-form">
            <input type="text" id="hibs-assistant-input" class="hibs-assistant-input" placeholder="Best acca, suggest legs, BTTS acca, 3-leg safer…" autocomplete="off" aria-label="Message">
            <button type="submit" class="hibs-assistant-send" id="hibs-assistant-send">Ask</button>
        </form>
    </div>
</div>

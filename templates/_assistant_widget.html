<button type="button" class="hibs-assistant-fab" id="hibs-assistant-fab" title="Betting Assistant" aria-label="Open betting assistant">💬</button>
<div class="hibs-assistant-panel" id="hibs-assistant-panel" role="dialog" aria-label="Betting Assistant">
    <div class="hibs-assistant-hd">
        <strong>hibs Assistant</strong>
        <button type="button" class="hibs-assistant-close" id="hibs-assistant-close" aria-label="Close">×</button>
    </div>
    <div class="hibs-assistant-body" id="hibs-assistant-body"></div>
    <div class="hibs-assistant-controls">
        <select id="hibs-assistant-fixture" aria-label="Select fixture">
            <option value="">— Select fixture —</option>
        </select>
        <div class="hibs-assistant-quick">
            <button type="button" data-prompt="deep-dive">Deep dive all</button>
            <button type="button" data-prompt="btts-acca">BTTS acca</button>
            <button type="button" data-prompt="goals-acca">Goals acca (O2.5)</button>
            <button type="button" data-prompt="win-acca">Win acca</button>
            <button type="button" data-prompt="best-singles">Best singles</button>
            <button type="button" data-prompt="analyze">Analyze match</button>
            <button type="button" data-prompt="value-all">Value scan</button>
        </div>
    </div>
</div>

<button type="button" class="hibs-assistant-fab" id="hibs-assistant-fab" title="Betting Assistant" aria-label="Open betting assistant">💬</button>
<div class="hibs-assistant-panel" id="hibs-assistant-panel" role="dialog" aria-label="Betting Assistant">
    <div class="hibs-assistant-hd">
        <strong>hibs Assistant</strong>
        <button type="button" class="hibs-assistant-close" id="hibs-assistant-close" aria-label="Close">×</button>
    </div>
    <div class="hibs-assistant-body" id="hibs-assistant-body"></div>
    <div class="hibs-assistant-controls">
        <select id="hibs-assistant-fixture" aria-label="Focus fixture (optional)">
            <option value="">— Focus fixture (optional) —</option>
        </select>
        <form class="hibs-assistant-compose" id="hibs-assistant-form">
            <input type="text" id="hibs-assistant-input" class="hibs-assistant-input" placeholder="Ask: best bets, BTTS acca, stats for Hibs v Hearts…" autocomplete="off" aria-label="Message">
            <button type="submit" class="hibs-assistant-send" id="hibs-assistant-send">Ask</button>
        </form>
    </div>
</div>

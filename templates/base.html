<!DOCTYPE html>
<html lang="en"{% if show_sky_panel %} class="hibs-sky-dock-enabled"{% endif %}>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style id="hibs-launch-critical">
        html.hibs-launch-boot,body.hibs-launch-active{overflow:hidden;}
        #hibs-launch-overlay{
            position:fixed;inset:0;z-index:100010;display:flex;align-items:center;justify-content:center;
            background:linear-gradient(165deg,#060e18 0%,#0c1a12 42%,#0a1628 100%);
        }
        #hibs-launch-overlay.hibs-launch-hidden{opacity:0;visibility:hidden;pointer-events:none;}
    </style>
    <script>document.documentElement.classList.add('hibs-launch-boot');</script>
    <title>{% block title %}hibs-bet{% endblock %}</title>
    <link rel="icon" href="/static/badge_harp_shield.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hibs-green:#007A33;
            --hibs-navy:#0a1628;
            --hibs-navy-deep:#060e18;
            --hibs-neon:#b7f7c8;
            --neon-value:#a7f3d0;
            --green:#bbf7d0;
            --green-dim:#3d6b52;
            --dark:#07110c;
            --slate-900:#102018;
            --slate-800:#172a21;
            --card:rgba(16,32,24,0.88);
            --border:rgba(190,220,205,0.16);
            --glow:rgba(0,122,51,0.14);
            --gold:#f6d889;
            --gold-dim:rgba(246,216,137,0.11);
            --accent:#c5f5d4;
            --blue:var(--accent);
            --red:#fca5a5;
            --text:#f8fafc;
            --muted:#94a3b8;
            --shadow-sm:0 4px 16px rgba(0,0,0,0.22);
            --shadow-md:0 10px 32px rgba(0,0,0,0.32);
            --shadow-lg:0 18px 48px rgba(0,0,0,0.42);
            --radius-sm:8px;
            --radius-md:12px;
            --radius-lg:16px;
            --transition-fast:0.18s ease;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
            background:var(--hibs-navy-deep);
            background-image:
                radial-gradient(ellipse at 12% 40%,rgba(0,122,51,0.12) 0%,transparent 48%),
                radial-gradient(ellipse at 88% 12%,rgba(246,216,137,0.06) 0%,transparent 44%),
                radial-gradient(ellipse at 50% 100%,rgba(0,122,51,0.08) 0%,transparent 55%);
            color:var(--text);min-height:100vh;padding:12px;
            position:relative;
            -webkit-font-smoothing:antialiased;
        }
        body::before{
            content:'';
            position:fixed;
            inset:0;
            z-index:0;
            pointer-events:none;
            opacity:0.045;
            background:url('/static/badge_harp_shield.png') repeat;
            background-size:100px 100px;
        }
        /* Hibs watermark: primary shield + heritage montage + individual crests (all assets in /static/). */
        body::after{
            content:'';
            position:fixed;
            inset:0;
            z-index:0;
            pointer-events:none;
            opacity:0.07;
            background-repeat:no-repeat;
            background-image:
                url('/static/badge_harp_shield.png'),
                url('/static/badges_heritage_montage.png'),
                url('/static/crest_variant_circle.png'),
                url('/static/crest_classic_fc.png'),
                url('/static/crest_official_circle.png');
            background-size:
                min(380px, 42vmin),
                min(340px, 52vw),
                min(100px, 15vmin),
                min(104px, 15vmin),
                min(104px, 15vmin);
            background-position:
                50% 40%,
                50% 88%,
                8% 88%,
                94% 10%,
                6% 10%;
            filter:drop-shadow(0 0 40px rgba(2,6,23,0.85));
        }
        @media(max-width:640px){
            body::after{
                opacity:0.04;
                background-size:
                    min(260px, 52vmin),
                    min(260px, 88vw),
                    min(72px, 18vmin),
                    min(76px, 18vmin),
                    min(76px, 18vmin);
                background-position:
                    50% 38%,
                    50% 92%,
                    4% 90%,
                    96% 6%,
                    4% 6%;
            }
        }
        .container{max-width:1400px;margin:0 auto;position:relative;z-index:1;}
        .dash-outer{position:relative;z-index:1;}

        /* HEADER */
        header{
            background:linear-gradient(145deg,rgba(16,32,24,0.94),rgba(10,22,16,0.88));border:1px solid var(--border);
            border-radius:18px;padding:18px 24px;margin-bottom:0;
            box-shadow:0 18px 56px rgba(0,0,0,0.34), inset 0 1px 0 rgba(255,255,255,0.03);
            display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
        }
        .brand{display:flex;align-items:center;gap:14px;}
        .brand-logo{
            font-family:'Orbitron',monospace;font-size:2em;font-weight:900;
            color:var(--hibs-neon);letter-spacing:0.12em;
            text-shadow:0 0 24px rgba(124,252,0,0.35);
        }
        .brand-sub{font-size:0.75em;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;}
        .header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
        .stat-pill{
            background:rgba(148,163,184,0.08);border:1px solid var(--border);
            border-radius:999px;padding:4px 12px;font-size:0.76em;color:var(--text);font-weight:600;
        }
        .stat-pill.gold{background:rgba(57,255,20,0.08);border-color:rgba(57,255,20,0.35);color:var(--neon-value);}
        .nav-btn{
            background:rgba(148,163,184,0.08);color:var(--text);padding:6px 14px;
            border-radius:999px;text-decoration:none;font-size:0.78em;font-weight:700;
            border:1px solid var(--border);transition:border-color var(--transition-fast),background var(--transition-fast),color var(--transition-fast),transform var(--transition-fast);
        }
        .nav-btn:hover{background:rgba(0,122,51,0.14);border-color:rgba(0,122,51,0.45);color:var(--neon-value);transform:translateY(-1px);}

        /* TABS */
        .tab-bar{
            display:flex;gap:4px;flex-wrap:wrap;margin-bottom:0;
            background:rgba(15,23,42,0.95);border:1px solid var(--border);
            border-radius:10px;padding:5px;
        }
        .tab-btn{
            padding:6px 14px;border:1px solid transparent;background:transparent;
            color:var(--muted);border-radius:7px;cursor:pointer;font-size:0.76em;
            font-weight:600;transition:all 0.2s;font-family:'Inter',sans-serif;
        }
        .tab-btn:hover{color:var(--text);background:rgba(248,250,252,0.04);}
        .tab-btn.active{background:rgba(57,255,20,0.1);color:var(--text);border-color:rgba(124,252,0,0.28);}
        .tab-btn.gold-tab.active{background:rgba(57,255,20,0.1);color:var(--neon-value);border-color:rgba(57,255,20,0.45);box-shadow:0 0 16px var(--glow);}
        .tab-panel{display:none;}
        .tab-panel.active{display:block;}
        .sub-tabs-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;padding:4px;background:rgba(2,6,23,0.5);border:1px solid var(--border);border-radius:8px;}
        .sub-tab{padding:5px 12px;border:1px solid transparent;background:transparent;color:var(--muted);border-radius:6px;cursor:pointer;font-size:0.72em;font-weight:700;font-family:'Inter',sans-serif;transition:all 0.2s;}
        .sub-tab:hover{color:var(--text);background:rgba(248,250,252,0.04);}
        .sub-tab.active{background:rgba(57,255,20,0.12);color:var(--neon-value);border-color:rgba(57,255,20,0.35);}
        .fr-menus{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
        .fr-pick-menu,.fr-league-snap{max-width:100%;min-width:0;flex:1 1 140px;font-size:0.62em;padding:3px 6px;border-radius:6px;border:1px solid rgba(148,163,184,0.25);background:rgba(2,6,23,0.75);color:var(--text);font-family:'Inter',sans-serif;}
        .fr-league-snap{flex:1 1 180px;}
        .hibs-assistant-fab{position:fixed;bottom:20px;right:20px;z-index:9999;width:52px;height:52px;border-radius:50%;border:1px solid rgba(167,243,208,0.5);background:linear-gradient(145deg,#1f4a34,#0b2418);color:var(--neon-value);font-size:1.4em;cursor:pointer;box-shadow:0 10px 32px rgba(0,0,0,0.42),0 0 24px rgba(167,243,208,0.16);transition:transform 0.2s,box-shadow 0.2s;}
        .hibs-assistant-fab:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 14px 38px rgba(0,0,0,0.48),0 0 30px rgba(167,243,208,0.24);}
        .hibs-assistant-panel{position:fixed;bottom:84px;right:20px;z-index:9999;width:min(420px,calc(100vw - 40px));max-height:min(76vh,600px);display:none;flex-direction:column;border-radius:18px;border:1px solid rgba(167,243,208,0.28);background:rgba(16,32,24,0.97);backdrop-filter:blur(14px);box-shadow:0 22px 60px rgba(0,0,0,0.48);overflow:hidden;}
        .hibs-assistant-panel.open{display:flex;}
        .hibs-assistant-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border);background:rgba(2,6,23,0.6);}
        .hibs-assistant-hd strong{font-family:'Orbitron',monospace;font-size:0.78em;color:var(--hibs-neon);}
        .hibs-assistant-close{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1.1em;padding:4px 8px;}
        .hibs-assistant-body{flex:1;overflow-y:auto;padding:10px 12px;font-size:0.78em;line-height:1.45;}
        .hibs-assistant-controls{padding:8px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;background:rgba(2,6,23,0.5);}
        .hibs-assistant-controls select,.hibs-assistant-controls button{font-size:0.72em;padding:6px 8px;border-radius:8px;border:1px solid var(--border);background:rgba(2,6,23,0.65);color:var(--text);font-family:'Inter',sans-serif;}
        .hibs-assistant-controls button{cursor:pointer;font-weight:700;color:var(--neon-value);border-color:rgba(57,255,20,0.35);}
        .hibs-assistant-controls button:hover{background:rgba(57,255,20,0.1);}
        .hibs-assistant-compose{display:flex;gap:6px;margin-top:6px;}
        .hibs-assistant-input{flex:1;min-width:0;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:rgba(7,17,12,0.72);color:var(--text);font-size:0.78em;font-family:'Inter',sans-serif;}
        .hibs-assistant-send{flex-shrink:0;padding:8px 12px;border-radius:8px;border:1px solid rgba(57,255,20,0.45);background:rgba(57,255,20,0.15);color:var(--neon-value);font-size:0.72em;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;}
        .hibs-assistant-send:disabled{opacity:0.5;cursor:wait;}
        .hibs-acca-legs{margin:6px 0 0 18px;padding:0;font-size:0.88em;}
        .hibs-acca-legs li{margin-bottom:4px;}
        .hibs-assistant-quick{display:flex;flex-wrap:wrap;gap:4px;}
        .hibs-assistant-quick{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
        .hibs-assistant-quick button{flex:1 1 auto;min-width:0;font-size:0.62em;padding:5px 6px;}
        .hibs-acca-legs{margin:6px 0 0 16px;padding:0;font-size:0.82em;line-height:1.35;}
        .hibs-acca-legs li{margin-bottom:4px;}
        .hibs-acca-card{border-color:rgba(57,255,20,0.22)!important;}
        .hibs-assistant-msg{margin-bottom:10px;padding:8px 10px;border-radius:8px;}
        .hibs-assistant-msg.bot{background:rgba(0,40,28,0.35);border:1px solid rgba(0,255,136,0.2);}
        .hibs-assistant-msg.user{background:rgba(57,255,20,0.08);border:1px solid rgba(124,252,0,0.22);text-align:right;}
        .hibs-assistant-card .ac-line{margin:0 0 4px;}
        .hibs-assistant-card ul{margin:4px 0 8px 16px;padding:0;}
        .fixture-rationale-card{margin-bottom:14px;padding:14px 16px;border-radius:14px;border:1px solid rgba(167,243,208,0.24);background:linear-gradient(145deg,rgba(20,83,45,0.24),rgba(15,23,42,0.24));}
        .rationale-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:0 0 10px;}
        @media(max-width:720px){.rationale-grid{grid-template-columns:1fr;}}
        .rationale-tile{border:1px solid rgba(190,220,205,0.14);border-radius:10px;padding:8px 9px;background:rgba(2,6,23,0.28);}
        .rationale-tile .rt-label{display:block;font-size:0.58em;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;}
        .rationale-tile strong{display:block;font-size:0.78em;color:var(--text);line-height:1.25;}
        .rationale-tile em{display:block;margin-top:3px;font-size:0.68em;color:var(--muted);font-style:normal;line-height:1.3;}
        .rationale-summary{margin:0 0 10px;font-size:0.82em;line-height:1.5;color:var(--text);}
        .rationale-figures{margin:0 0 10px 18px;padding:0;font-size:0.78em;line-height:1.45;color:var(--muted);list-style:disc;}
        .rationale-figures li{margin-bottom:3px;}

        /* GRID */
        .fixtures-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
            gap:10px;
        }
        .fixtures-full-list{display:flex;flex-direction:column;gap:0;max-width:100%;}
        .league-drawer{
            border:1px solid var(--border);border-radius:12px;margin-bottom:10px;
            background:rgba(15,23,42,0.72);overflow:hidden;
        }
        .league-drawer-summary{
            cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;
            gap:10px;padding:11px 14px;font-weight:700;font-size:0.85em;background:rgba(2,6,23,0.55);
        }
        .league-drawer-summary::-webkit-details-marker{display:none;}
        .league-drawer[open] .league-drawer-summary{border-bottom:1px solid var(--border);}
        .league-drawer-title{display:flex;align-items:center;gap:8px;}
        .league-drawer-count{font-size:0.72em;color:var(--muted);font-weight:600;}
        .league-drawer-body{padding:10px 12px 12px;display:flex;flex-direction:column;gap:8px;}
        .api-missing-banner{
            margin:0 0 10px;padding:11px 14px;border-radius:10px;
            border:1px solid rgba(251,191,36,0.35);background:rgba(251,191,36,0.07);
            font-size:0.78em;line-height:1.45;color:var(--text);
        }
        .api-missing-banner code{font-size:0.88em;color:#fde68a;}
        .tournament-focus-banner{
            margin:0 0 10px;padding:11px 14px;border-radius:10px;
            border:1px solid rgba(124,252,0,0.35);background:rgba(57,255,20,0.08);
            font-size:0.78em;line-height:1.45;color:var(--text);
        }

        /* —— Reference dashboard (hibs-bet) —— */
        .ref-page{max-width:1720px;margin:0 auto;position:relative;}
        .ref-page::after{
            content:'';position:absolute;left:0;right:0;bottom:0;height:min(42vh,520px);
            pointer-events:none;opacity:0.12;z-index:0;
            background:
                linear-gradient(to top, rgba(2,24,10,0.55) 0%, rgba(57,255,20,0.06) 35%, transparent 92%),
                url('/static/stadium_easter_road.png') center bottom / min(1200px, 100%) no-repeat;
            mask-image:linear-gradient(to top, #000 0%, transparent 92%);
            -webkit-mask-image:linear-gradient(to top, #000 0%, transparent 92%);
        }
        .ref-page > *{position:relative;z-index:1;}
        .site-top{
            display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
            padding:12px 14px 14px;border-bottom:1px solid var(--border);margin-bottom:14px;
            border-radius:var(--radius-lg);
            background:
                linear-gradient(180deg, rgba(10,22,40,0.72) 0%, rgba(10,22,40,0.28) 100%),
                url('/static/badges_heritage_montage.png') right 12px center / 160px no-repeat;
            box-shadow:var(--shadow-sm);
        }
        .site-top-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
        .site-top-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
        .site-crest{flex-shrink:0;width:38px;height:38px;object-fit:contain;border-radius:10px;box-shadow:0 0 0 2px rgba(255,215,0,0.22);}
        .site-wordmark{font-family:'Orbitron',monospace;font-weight:900;font-size:1.15em;color:var(--hibs-neon);letter-spacing:0.08em;}
        .site-links{display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
        .site-link{font-size:0.72em;padding:5px 10px;border-radius:999px;color:var(--muted);text-decoration:none;font-weight:600;transition:color var(--transition-fast),background var(--transition-fast),border-color var(--transition-fast);}
        .site-link:hover{color:var(--text);background:rgba(148,163,184,0.06);}
        .site-link-active{background:rgba(0,122,51,0.16);color:var(--neon-value);border:1px solid rgba(0,122,51,0.42);}
        .site-link-muted{opacity:0.45;cursor:default;}
        @media(max-width:900px){
            .site-top{background:linear-gradient(180deg, rgba(15,23,42,0.55) 0%, transparent 100%);}
        }
        .pill-soft{font-size:0.7em;color:var(--muted);display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;border:1px solid var(--border);}
        .odds-toggle{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
        .ot{background:rgba(6,14,24,0.65);border:none;color:var(--muted);padding:5px 12px;font-size:0.7em;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:background var(--transition-fast),color var(--transition-fast);}
        .ot:hover{color:var(--text);background:rgba(148,163,184,0.08);}
        .ot-active{background:rgba(0,122,51,0.16);color:var(--neon-value);}
        html[data-hibs-theme="pastel"]{
            --hibs-neon:#c7f9d7;
            --green:#c7f9d7;
            --neon-value:#b8f7d2;
            --gold:#ffe6a7;
            --accent:#d4f7e0;
            --blue:var(--accent);
            --card:rgba(24,38,32,0.86);
            --border:rgba(221,245,232,0.2);
            --glow:rgba(199,249,215,0.18);
        }
        html[data-hibs-theme="low-glow"]{
            --hibs-neon:#a7f3d0;
            --neon-value:#a7f3d0;
            --glow:rgba(167,243,208,0.05);
            --border:rgba(190,220,205,0.11);
        }
        html[data-hibs-font="system"] body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
        html[data-hibs-font="large"] body{font-size:17px;}
        html[data-hibs-density="compact"] body{padding:6px;}
        html[data-hibs-density="compact"] .site-top{padding:8px 12px;}
        html[data-hibs-density="compact"] .hero-strip,
        html[data-hibs-density="compact"] .dash-info-box,
        html[data-hibs-density="compact"] .betting-guide,
        html[data-hibs-density="compact"] .acca-week-card{margin-bottom:8px;}
        html[data-hibs-density="compact"] .fr-sum{padding:5px 7px;}
        html[data-hibs-density="compact"] .lg-block{padding:7px 7px 4px;margin-bottom:8px;}
        html[data-hibs-density="spacious"] .fixtures-full-list,
        html[data-hibs-density="spacious"] .dash-upcoming{gap:8px;}
        html[data-hibs-density="spacious"] .fr-sum{padding:11px 10px;}
        .btn-refresh{background:rgba(0,122,51,0.18);border:1px solid rgba(0,122,51,0.5);color:var(--neon-value);padding:6px 14px;border-radius:var(--radius-sm);font-size:0.72em;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;transition:background var(--transition-fast),border-color var(--transition-fast),transform var(--transition-fast),box-shadow var(--transition-fast);}
        .btn-refresh:hover{background:rgba(0,122,51,0.28);border-color:rgba(167,243,208,0.45);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,122,51,0.2);}
        .btn-refresh:disabled{opacity:0.65;cursor:wait;transform:none;}
        .fetch-days-toolbar{display:inline-flex;align-items:center;gap:6px;font-size:0.72em;color:var(--muted);}
        .fetch-days-lbl{font-weight:700;letter-spacing:0.04em;text-transform:uppercase;font-size:0.9em;}
        .fetch-days-select{background:rgba(15,23,42,0.9);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:5px 8px;font-size:0.95em;font-family:'Inter',sans-serif;cursor:pointer;}
        .ref-cols{display:grid;grid-template-columns:minmax(0,1fr);gap:16px;align-items:start;}
        @media(min-width:1180px){.ref-cols.ref-cols-sidebar{grid-template-columns:minmax(220px,280px) minmax(0,1fr);}}
        .dash-sidebar{align-self:start;position:sticky;top:12px;z-index:2;}
        @media(max-width:1180px){.dash-sidebar{position:static;}}
        .dash-sidebar-inner{
            border:1px solid var(--border);border-radius:14px;padding:12px 12px 14px;
            background:rgba(15,23,42,0.96);box-shadow:0 8px 28px rgba(0,0,0,0.35);
        }
        .dash-side-hd{font-family:'Orbitron',monospace;font-size:0.72em;font-weight:800;color:var(--hibs-neon);letter-spacing:0.12em;text-transform:uppercase;margin:0 0 10px;}
        .dash-sidebar .search-chips{margin-bottom:10px;flex-direction:column;align-items:stretch;}
        .dash-sidebar .dash-search{max-width:none;width:100%;}
        .dash-sidebar .chip-row{max-height:220px;overflow-y:auto;padding-bottom:2px;}

        }
        .fr-od-value{
            color:#1c1910 !important;font-weight:900;
            background:linear-gradient(180deg,rgba(253,224,71,0.95),rgba(251,191,36,0.88));
            border-radius:5px;
            box-shadow:0 0 10px rgba(255,215,0,0.35),inset 0 0 0 1px rgba(255,255,255,0.35);
            position:relative;
        }
        .fr-od-value::after{
            content:'⚡';position:absolute;top:-7px;right:-4px;font-size:0.65em;
            line-height:1;text-shadow:0 0 6px rgba(255,255,255,0.6);
        }
        .fr-dq{font-size:0.55em;font-weight:800;padding:1px 6px;border-radius:4px;margin-top:4px;display:inline-block;letter-spacing:0.02em;}
        .fr-dq.fr-dq-compact{margin-top:0;font-size:0.62em;padding:2px 7px;border-radius:999px;}
        .fr-dq.ok{background:rgba(57,255,20,0.1);color:var(--neon-value);border:1px solid rgba(57,255,20,0.28);}
        .fr-dq.mid{background:rgba(251,191,36,0.08);color:#fde68a;border:1px solid rgba(251,191,36,0.28);}
        .fr-dq.low{background:rgba(248,113,113,0.10);color:#fecaca;border:1px solid rgba(248,113,113,0.22);}
        .fixture-card[data-data-q] .fr-sum .fr-dq-compact{box-shadow:0 0 0 1px rgba(15,23,42,0.6);}
        .acca-rail{position:sticky;top:12px;}
        .acca-rail-card{border:1px solid var(--border);border-radius:14px;padding:14px;background:rgba(15,23,42,0.95);box-shadow:0 12px 40px rgba(0,0,0,0.35);}
        .acca-rail-hd{font-family:'Orbitron',monospace;font-size:0.9em;color:var(--hibs-neon);font-weight:800;margin-bottom:10px;}
        .acca-rail-st{font-size:0.75em;color:var(--muted);margin-bottom:4px;}
        .acca-rail-empty{text-align:center;font-size:0.72em;color:var(--muted);padding:18px 8px;border:1px dashed rgba(148,163,184,0.2);border-radius:10px;margin:10px 0;}
        .acca-rail-lbl{display:block;font-size:0.65em;color:var(--muted);margin:8px 0 4px;font-weight:700;text-transform:uppercase;}
        .acca-rail-input{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:rgba(2,6,23,0.5);color:var(--text);font-size:0.85em;}
        .acca-rail-btn{display:block;text-align:center;margin-top:10px;padding:10px;border-radius:10px;background:linear-gradient(180deg,#22c55e,#15803d);color:#052e16;font-weight:900;font-size:0.82em;text-decoration:none;}
        .acca-rail-sec{width:100%;margin-top:8px;padding:8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:0.72em;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
        .acca-rail-books{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
        .book-pill{font-size:0.62em;padding:4px 8px;border-radius:6px;border:1px solid var(--border);color:var(--muted);}
        .rail-status-link{margin-top:12px;}
        .rail-health{margin-top:12px;border:1px solid var(--border);border-radius:10px;background:rgba(2,6,23,0.45);}
        .rail-health summary{cursor:pointer;padding:8px 10px;font-size:0.72em;font-weight:700;color:var(--muted);list-style:none;}
        .rail-health summary::-webkit-details-marker{display:none;}
        .health-grid-tight{padding:0 8px 8px;}
        .status-page{max-width:900px;margin:0 auto;}
        .status-hero{border-bottom:1px solid var(--border);padding:10px 4px 16px;margin-bottom:16px;}
        .status-hero h1{font-family:'Orbitron',monospace;font-size:1.25em;color:var(--hibs-neon);letter-spacing:0.06em;margin-bottom:6px;}
        .status-hero p{font-size:0.8em;color:var(--muted);line-height:1.5;}
        .status-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
        .status-btn{background:rgba(57,255,20,0.12);border:1px solid rgba(57,255,20,0.4);color:var(--neon-value);padding:6px 14px;border-radius:8px;font-size:0.75em;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;}
        .status-btn:hover{filter:brightness(1.08);}
        .status-section{margin-bottom:18px;}
        .status-section h2{font-size:0.72em;font-weight:800;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px;}
        .status-note{font-size:0.72em;color:var(--muted);margin-top:10px;line-height:1.45;}
        .status-err{font-size:0.68em;color:#fca5a5;margin-top:4px;font-weight:500;}
        .settings-page{max-width:1040px;margin:0 auto;}
        .settings-hero{border:1px solid var(--border);border-radius:16px;padding:18px;background:linear-gradient(145deg,rgba(15,23,42,0.96),rgba(2,6,23,0.9));margin:0 0 14px;}
        .settings-title{font-family:'Orbitron',monospace;font-size:1.35em;color:var(--hibs-neon);letter-spacing:0.06em;margin:0 0 6px;}
        .settings-sub{font-size:0.82em;color:var(--muted);line-height:1.5;max-width:800px;}
        .settings-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
        @media(max-width:820px){.settings-grid{grid-template-columns:1fr;}}
        .settings-card{border:1px solid var(--border);border-radius:14px;background:rgba(15,23,42,0.88);padding:14px;}
        .settings-card h2{font-size:0.78em;color:var(--hibs-neon);text-transform:uppercase;letter-spacing:0.12em;margin:0 0 10px;}
        .setting-row{display:grid;gap:6px;margin-top:12px;}
        .setting-row:first-of-type{margin-top:0;}
        .setting-row label,.setting-check{font-size:0.78em;font-weight:800;color:var(--text);}
        .setting-row p{font-size:0.72em;color:var(--muted);line-height:1.45;margin:0;}
        .setting-row select{width:100%;padding:8px 10px;border-radius:9px;border:1px solid var(--border);background:rgba(2,6,23,0.68);color:var(--text);font-family:'Inter',sans-serif;font-size:0.8em;}
        .setting-check{display:flex;align-items:flex-start;gap:8px;line-height:1.35;}
        .setting-check input{margin-top:2px;accent-color:var(--neon-value);}
        .settings-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
        .settings-save-note{font-size:0.72em;color:var(--muted);line-height:1.45;margin-top:10px;}

        /* CARD */
        .fixture-card{
            background:var(--card);border:1px solid var(--border);
            border-radius:12px;padding:14px;
            cursor:default;transition:border-color 0.2s,box-shadow 0.2s;
            position:relative;overflow:hidden;
        }
        .fixture-card>.fixture-summary{
            cursor:pointer;list-style:none;position:relative;padding-right:72px;
        }
        .fixture-card>.fixture-summary::-webkit-details-marker{display:none;}
        .fixture-card::before{
            content:'';position:absolute;top:0;left:0;right:0;height:2px;
            background:linear-gradient(90deg,transparent,rgba(148,163,184,0.35),transparent);opacity:0.35;
        }
        .fixture-card:hover{border-color:rgba(148,163,184,0.28);box-shadow:0 6px 24px rgba(0,0,0,0.35);}
        .fixture-card.value-card{border-color:rgba(255,215,0,0.55);}
        .fixture-card.value-card::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.9;}
        .fixture-card.value-multi{box-shadow:0 0 24px rgba(255,215,0,0.16);}
        .fixture-card[open] .expand-panel{display:block;}
        .fixture-card:not([open]) .expand-panel{display:none;}

        /* VALUE BADGE */
        .value-badge{
            position:absolute;top:10px;right:10px;
            background:rgba(0,0,0,0.75);border:1px solid rgba(57,255,20,0.65);
            color:var(--neon-value);font-size:0.62em;font-weight:800;
            padding:2px 8px;border-radius:999px;letter-spacing:0.08em;
            box-shadow:0 0 14px rgba(57,255,20,0.35);
        }

        /* CARD TOP */
        .card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
        .league-pill{
            font-size:0.68em;color:var(--blue);font-weight:700;
            background:rgba(0,122,51,0.1);padding:2px 8px;
            border-radius:999px;border:1px solid rgba(0,122,51,0.22);
            text-transform:uppercase;letter-spacing:0.04em;
        }
        .kick-off{font-size:0.72em;color:var(--muted);font-weight:600;}

        /* TEAMS ROW */
        .teams-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:10px;}
        .team-block{}
        .team-right{text-align:right;}
        .team-nm{font-weight:700;font-size:0.92em;color:var(--text);line-height:1.2;margin-bottom:3px;}
        .team-meta{font-size:0.65em;color:var(--muted);margin-bottom:4px;}
        .form-dots{display:flex;gap:2px;flex-wrap:wrap;}
        .team-right .form-dots{justify-content:flex-end;}
        .form-dots-compact .fd{width:15px;height:15px;font-size:0.55em;}
        .fd{
            width:18px;height:18px;border-radius:4px;
            display:inline-flex;align-items:center;justify-content:center;
            font-size:0.6em;font-weight:800;
        }
        .fd-W{background:rgba(124,252,0,0.18);color:var(--green);border:1px solid rgba(124,252,0,0.3);}
        .fd-D{background:rgba(255,165,0,0.15);color:#FFA500;border:1px solid rgba(255,165,0,0.25);}
        .fd-L{background:rgba(255,68,68,0.15);color:var(--red);border:1px solid rgba(255,68,68,0.25);}

        /* ODDS TRIO */
        .score-col{display:flex;flex-direction:column;align-items:center;}
        .odds-trio{display:flex;gap:4px;}
        .odd-box{
            background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
            border-radius:7px;padding:5px 7px;text-align:center;min-width:44px;
        }
        .odd-box.best{border-color:rgba(57,255,20,0.45);background:rgba(57,255,20,0.06);}
        .odd-box.best .odd-val{color:var(--neon-value);}
        .odd-lbl{font-size:0.6em;color:var(--muted);font-weight:700;text-transform:uppercase;}
        .odd-val{font-size:0.95em;font-weight:700;color:var(--text);}
        .odd-pct{font-size:0.58em;color:var(--muted);margin-top:1px;}

        /* MARKET PILLS */
        .market-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
        .mpill{
            background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
            border-radius:6px;padding:3px 8px;font-size:0.68em;color:var(--muted);
        }
        .mpill strong{color:var(--text);}
        .mpill.conf strong{color:var(--blue);}
        .mpill.vbpill{background:rgba(57,255,20,0.08);border-color:rgba(57,255,20,0.35);color:var(--neon-value);font-weight:700;}

        /* EXPAND PANEL */
        .expand-panel{border-top:1px solid rgba(0,122,51,0.12);padding:14px 10px 12px;margin-top:8px;background:rgba(6,14,24,0.35);border-radius:0 0 var(--radius-sm) var(--radius-sm);}

        /* SECTION TITLE */
        .section-title{font-size:0.68em;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;font-weight:700;margin-bottom:6px;}

        /* RESULT ROWS */
        .h2h-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
        .h2h-col{}
        .result-row{display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.72em;}
        .result-row:last-child{border-bottom:none;}
        .res-badge{width:18px;height:18px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:0.7em;font-weight:800;flex-shrink:0;}
        .res-W{background:rgba(124,252,0,0.18);color:var(--green);}
        .res-D{background:rgba(255,165,0,0.15);color:#FFA500;}
        .res-L{background:rgba(255,68,68,0.15);color:var(--red);}
        .res-ha{font-size:0.7em;padding:1px 3px;border-radius:3px;flex-shrink:0;}
        .ha-H{background:rgba(124,252,0,0.08);color:var(--green);}
        .ha-A{background:rgba(0,122,51,0.1);color:var(--accent);}
        .res-opp{flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .res-score{color:var(--text);font-weight:700;flex-shrink:0;}
        .res-date{color:var(--muted);flex-shrink:0;font-size:0.85em;}

        /* DATA TABLE */
        .data-table{width:100%;border-collapse:collapse;font-size:0.72em;margin-bottom:4px;}
        .data-table th{color:var(--muted);font-weight:600;padding:3px 5px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.05);}
        .data-table td{padding:4px 5px;border-bottom:1px solid rgba(255,255,255,0.03);}
        .data-table tr:last-child td{border-bottom:none;}
        .home-row td,.home-row{color:#86efac;}
        .away-row td,.away-row{color:var(--blue);}

        /* VALUE BET PANEL */
        .value-bet-panel{
            background:linear-gradient(135deg,rgba(255,215,0,0.07),rgba(255,165,0,0.04));
            border:1px solid rgba(255,215,0,0.25);border-radius:9px;padding:10px;
        }
        .value-bet-title{font-size:0.72em;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;}
        .vb-row{display:flex;gap:10px;flex-wrap:wrap;font-size:0.75em;}
        .green{color:var(--green);}
        .gold{color:var(--gold);}
        .kelly-label{display:inline-block;padding:2px 7px;border-radius:999px;font-size:0.7em;font-weight:700;text-transform:uppercase;}
        .kelly-strong{background:rgba(124,252,0,0.12);color:var(--green);border:1px solid rgba(124,252,0,0.25);}
        .kelly-moderate{background:rgba(0,122,51,0.1);color:var(--accent);border:1px solid rgba(0,122,51,0.22);}
        .kelly-cautious{background:rgba(255,165,0,0.09);color:#FFA500;border:1px solid rgba(255,165,0,0.2);}
        .kelly-skip{background:rgba(255,68,68,0.07);color:var(--red);border:1px solid rgba(255,68,68,0.15);}

        /* CONF BAR */
        .conf-bar-wrap{}
        .conf-label{font-size:0.65em;color:var(--muted);margin-bottom:3px;display:flex;justify-content:space-between;}
        .conf-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden;}
        .conf-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green-dim),var(--green));}

        /* H/D/A OUTCOME BAR (old hibs.bet style) */
        .outcome-bar{display:flex;height:28px;border-radius:8px;overflow:hidden;font-size:0.68em;font-weight:700;line-height:28px;}
        .ob-seg{display:flex;align-items:center;justify-content:center;min-width:2.5em;white-space:nowrap;overflow:hidden;}
        .ob-h{background:var(--green);color:#0a0f0a;}
        .ob-d{background:rgba(255,255,255,0.12);color:var(--text);}
        .ob-a{background:var(--green);color:#0a0f0a;}

        /* FORM SUMMARY */
        .form-summary{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
        .fs-w{font-size:0.68em;font-weight:800;color:var(--green);background:rgba(124,252,0,0.1);border:1px solid rgba(124,252,0,0.2);padding:2px 7px;border-radius:5px;}
        .fs-d{font-size:0.68em;font-weight:800;color:#FFA500;background:rgba(255,165,0,0.1);border:1px solid rgba(255,165,0,0.2);padding:2px 7px;border-radius:5px;}
        .fs-l{font-size:0.68em;font-weight:800;color:var(--red);background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.2);padding:2px 7px;border-radius:5px;}
        .fs-stat{font-size:0.65em;color:var(--muted);background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);padding:2px 7px;border-radius:5px;}
        .form-strip{display:flex;gap:3px;flex-wrap:wrap;}
        .ha-badge{font-size:0.72em;padding:1px 4px;border-radius:3px;}
        .ha-H{background:rgba(124,252,0,0.09);color:var(--green);}
        .ha-A{background:rgba(0,122,51,0.1);color:var(--accent);}
        .result-W{color:var(--green);font-weight:700;}
        .result-D{color:#FFA500;font-weight:700;}
        .result-L{color:var(--red);font-weight:700;}
        .green{color:var(--green);}
        .gold{color:var(--gold);}
        .empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
        .empty-state .icon{font-size:2.2em;margin-bottom:8px;}

        .dash-outer{max-width:1720px;margin:0 auto;width:100%;}
        .dash-layout{display:grid;gap:16px;grid-template-columns:1fr;}
        @media(max-width:1023px){
            .dash-sidebar{
                border:1px solid rgba(0,122,51,0.16);border-radius:var(--radius-lg);
                padding:14px 12px;background:rgba(10,22,40,0.88);
                box-shadow:var(--shadow-md);
            }
            .site-top{padding:10px 12px;}
            .site-links{gap:2px;}
            .site-top-right{width:100%;justify-content:flex-start;}
        }
        @media (min-width:1024px){
            .dash-layout{grid-template-columns:minmax(252px,280px) minmax(0,1fr);align-items:start;gap:18px;}
            .dash-sidebar{
                position:sticky;top:12px;align-self:start;
                max-height:calc(100vh - 24px);overflow-y:auto;overflow-x:hidden;
                z-index:40;
                background:linear-gradient(180deg,rgba(10,22,40,0.98),rgba(6,14,24,0.96));
                border:1px solid rgba(0,122,51,0.18);border-radius:var(--radius-lg);padding:16px 14px;
                box-shadow:var(--shadow-lg);
                backdrop-filter:blur(12px);
            }
        }
        .dash-side-hd{font-family:'Orbitron',monospace;font-size:0.72em;font-weight:800;color:var(--hibs-neon);letter-spacing:0.12em;text-transform:uppercase;margin:0 0 6px;}
        .dash-side-sub{font-size:0.68em;color:var(--muted);line-height:1.4;margin:0 0 12px;padding-bottom:12px;border-bottom:1px solid rgba(148,163,184,0.12);}
        .dash-main{min-width:0;}
        .dash-sidebar-filters{margin-bottom:10px;}
        .chip-region{font-size:0.72em;padding:5px 10px;font-weight:700;letter-spacing:0.02em;}
        .chip-region.active{background:rgba(0,122,51,0.16);border-color:rgba(0,122,51,0.48);color:var(--neon-value);box-shadow:0 0 14px rgba(0,122,51,0.14);}
        .region-filter-hint{margin:4px 0 8px;font-size:0.68em;line-height:1.4;color:var(--muted);padding:6px 8px;border-radius:var(--radius-sm);background:rgba(0,122,51,0.06);border:1px solid rgba(0,122,51,0.12);}
        .xg-source-hint{color:#86efac;font-style:normal;font-weight:600;}
        .xg-source-hint-detail{margin:4px 0 0;font-size:0.72em;line-height:1.4;color:#a7f3d0;font-style:normal;}
        html[data-hibs-theme="pastel"] .xg-source-hint{color:#4ade80;}
        html[data-hibs-theme="pastel"] .xg-source-hint-detail{color:#6ee7b7;}
        .dash-upcoming{display:flex;flex-direction:column;gap:2px;max-height:min(58vh,640px);overflow-y:auto;margin-top:8px;padding-right:2px;}
        .du-day{font-size:0.62em;font-weight:800;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin:10px 0 4px;padding-top:4px;border-top:1px solid rgba(148,163,184,0.12);}
        .du-day:first-child{border-top:none;margin-top:0;padding-top:0;}
        .du-row{display:grid;grid-template-columns:42px minmax(0,1fr);gap:6px;align-items:start;padding:6px 8px;border-radius:var(--radius-sm);text-decoration:none;color:var(--text);font-size:0.72em;line-height:1.3;border:1px solid transparent;transition:background var(--transition-fast),border-color var(--transition-fast),color var(--transition-fast);}
        .du-row:hover{background:rgba(0,122,51,0.1);border-color:rgba(0,122,51,0.22);color:var(--neon-value);}
        .du-ko{font-variant-numeric:tabular-nums;font-weight:700;color:var(--muted);display:flex;flex-direction:column;gap:2px;}
        .du-conf{display:block;font-size:0.82em;color:var(--neon-value);font-weight:800;line-height:1.1;letter-spacing:0.02em;}
        .du-snippet{display:block;font-size:0.88em;color:var(--muted);margin-top:2px;line-height:1.25;}
        .du-teams{min-width:0;word-break:break-word;}
        .du-vs{color:var(--muted);margin:0 2px;}
        .du-empty,.du-hint{font-size:0.68em;color:var(--muted);margin:8px 0 0;}
        .lg-count{font-weight:600;opacity:0.65;}
        .fixture-card.fixture-highlight{outline:2px solid rgba(57,255,20,0.55);box-shadow:0 0 0 4px rgba(57,255,20,0.12);}
        .dash-side-brand{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);}
        .dash-side-brand .brand-logo{font-size:1.45em;display:block;letter-spacing:0.1em;}
        .dash-nav{margin-bottom:16px;}

<script>
    function toggleCard(card) {
        card.classList.toggle('open');
    }
    function switchTab(evt, tabId, groupId) {
        document.querySelectorAll('[data-group="'+groupId+'"]').forEach(p=>p.classList.remove('active'));
        document.querySelectorAll('[data-tab-group="'+groupId+'"]').forEach(b=>b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        var t = evt && evt.currentTarget ? evt.currentTarget : (typeof event !== 'undefined' ? event.currentTarget : null);
        if (t) { t.classList.add('active'); }
        document.dispatchEvent(new CustomEvent('hibs-tab-change', { detail: { tabId: tabId, groupId: groupId } }));
    }
    (function (global) {
        var KEY = 'hibs_user_settings_v1';
        var DEFAULTS = {
            profile: 'balanced',
            theme: 'default',
            density: 'comfortable',
            font: 'standard',
            dataQualityMin: '',
            fullDataDefault: false,
            fetchDays: '5'
        };
        var FETCH_DAYS_KEY = 'hibs_fetch_days';
        var PROFILE_LABELS = {
            balanced: 'Balanced',
            conservative: 'Conservative',
            value: 'Value-aware'
        };

        function read() {
            try {
                return Object.assign({}, DEFAULTS, JSON.parse(global.localStorage.getItem(KEY) || '{}'));
            } catch (e) {
                return Object.assign({}, DEFAULTS);
            }
        }

        function normalizeFetchDays(raw) {
            var d = String(raw || DEFAULTS.fetchDays);
            return d === '7' ? '7' : '5';
        }

        function write(settings) {
            var next = Object.assign({}, DEFAULTS, settings || {});
            next.fetchDays = normalizeFetchDays(next.fetchDays);
            try {
                global.localStorage.setItem(KEY, JSON.stringify(next));
                global.localStorage.setItem(FETCH_DAYS_KEY, next.fetchDays);
            } catch (e) {}
            apply(next);
            document.dispatchEvent(new CustomEvent('hibs-settings-change', { detail: next }));
            return next;
        }

        function apply(settings) {
            var s = Object.assign({}, DEFAULTS, settings || read());
            document.documentElement.setAttribute('data-hibs-theme', s.theme || DEFAULTS.theme);
            document.documentElement.setAttribute('data-hibs-density', s.density || DEFAULTS.density);
            document.documentElement.setAttribute('data-hibs-font', s.font || DEFAULTS.font);
            document.querySelectorAll('[data-hibs-setting-label="profile"]').forEach(function (node) {
                node.textContent = PROFILE_LABELS[s.profile] || PROFILE_LABELS.balanced;
            });
            document.querySelectorAll('[data-hibs-settings-summary]').forEach(function (node) {
                var dq = s.dataQualityMin ? s.dataQualityMin + '% data bar' : 'Default data bar';
                var win = normalizeFetchDays(s.fetchDays) + '-day fixtures';
                node.textContent = (PROFILE_LABELS[s.profile] || PROFILE_LABELS.balanced) + ' profile · ' + win + ' · ' + dq;
            });
            document.querySelectorAll('[data-hibs-fetch-days-select]').forEach(function (el) {
                el.value = normalizeFetchDays(s.fetchDays);
            });
        }

        function appendFetchDays(url) {
            var days = normalizeFetchDays(read().fetchDays);
            try {
                var stored = global.localStorage.getItem(FETCH_DAYS_KEY);
                if (stored) days = normalizeFetchDays(stored);
            } catch (e) {}
            var base = url || '/';
            var parts = base.split('#');
            var path = parts[0];
            var hash = parts.length > 1 ? '#' + parts.slice(1).join('#') : '';
            var q = path.indexOf('?') >= 0 ? '&' : '?';
            if (/[?&]days=/.test(path)) return base;
            return path + q + 'days=' + days + hash;
        }

        function syncControls(root) {
            var scope = root || document;
            var s = read();
            scope.querySelectorAll('[data-hibs-setting]').forEach(function (el) {
                var key = el.getAttribute('data-hibs-setting');
                if (key && Object.prototype.hasOwnProperty.call(s, key)) el.value = s[key];
            });
            scope.querySelectorAll('[data-hibs-setting-check]').forEach(function (el) {
                var key = el.getAttribute('data-hibs-setting-check');
                if (key && Object.prototype.hasOwnProperty.call(s, key)) el.checked = !!s[key];
            });
        }

        function bind(root) {
            var scope = root || document;
            syncControls(scope);
            scope.querySelectorAll('[data-hibs-setting]').forEach(function (el) {
                if (el.getAttribute('data-hibs-setting-bound') === '1') return;
                el.setAttribute('data-hibs-setting-bound', '1');
                el.addEventListener('change', function () {
                    var key = el.getAttribute('data-hibs-setting');
                    var s = read();
                    s[key] = el.value;
                    write(s);
                    if (key === 'fetchDays') {
                        global.location.href = appendFetchDays('/');
                    }
                });
            });
            scope.querySelectorAll('[data-hibs-setting-check]').forEach(function (el) {
                if (el.getAttribute('data-hibs-setting-bound') === '1') return;
                el.setAttribute('data-hibs-setting-bound', '1');
                el.addEventListener('change', function () {
                    var s = read();
                    s[el.getAttribute('data-hibs-setting-check')] = !!el.checked;
                    write(s);
                });
            });
            scope.querySelectorAll('[data-hibs-settings-reset]').forEach(function (btn) {
                if (btn.getAttribute('data-hibs-setting-bound') === '1') return;
                btn.setAttribute('data-hibs-setting-bound', '1');
                btn.addEventListener('click', function () {
                    write(DEFAULTS);
                    syncControls(document);
                    if (global.HibsOdds && typeof global.HibsOdds.applyFormat === 'function') {
                        global.HibsOdds.applyFormat('dec');
                    }
                });
            });
            apply(s);
        }

        global.HibsSettings = {
            STORAGE_KEY: KEY,
            FETCH_DAYS_KEY: FETCH_DAYS_KEY,
            DEFAULTS: DEFAULTS,
            get: read,
            save: write,
            apply: apply,
            bind: bind,
            normalizeFetchDays: normalizeFetchDays,
            appendFetchDays: appendFetchDays,
            profileLabel: function (profile) { return PROFILE_LABELS[profile] || PROFILE_LABELS.balanced; }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function () { bind(document); });
        } else {
            bind(document);
        }
    })(window);
</script>
<script>
    (function (global) {
        var TIPS = [
            'Fetching fixtures…',
            'Enriching xG…',
            'Loading odds…',
            'Building predictions…',
            'Checking form & standings…',
            'Scoring data quality…'
        ];
        var overlay = document.getElementById('hibs-launch-overlay');
        if (!overlay) return;

        var tipEl = document.getElementById('hibs-launch-tip');
        var tipIdx = 0;
        var tipTimer = null;
        var hideTimer = null;
        var hidden = false;
        var shownAt = Date.now();
        var pageLoaded = false;
        var MIN_DISPLAY_MS = 800;

        function startTips() {
            if (tipTimer) return;
            tipTimer = global.setInterval(function () {
                if (!tipEl || hidden) return;
                tipIdx = (tipIdx + 1) % TIPS.length;
                tipEl.classList.add('hibs-launch-tip-fade');
                global.setTimeout(function () {
                    if (tipEl) {
                        tipEl.textContent = TIPS[tipIdx];
                        tipEl.classList.remove('hibs-launch-tip-fade');
                    }
                }, 280);
            }, 3000);
        }

        function hideLaunchOverlay() {
            if (hidden) return;
            hidden = true;
            overlay.classList.add('hibs-launch-hidden');
            overlay.setAttribute('aria-busy', 'false');
            document.body.classList.remove('hibs-launch-active');
            document.documentElement.classList.remove('hibs-launch-boot');
            if (tipTimer) {
                global.clearInterval(tipTimer);
                tipTimer = null;
            }
            if (hideTimer) {
                global.clearTimeout(hideTimer);
                hideTimer = null;
            }
        }

        function showLaunchOverlay() {
            hidden = false;
            shownAt = Date.now();
            pageLoaded = false;
            overlay.classList.remove('hibs-launch-hidden');
            overlay.setAttribute('aria-busy', 'true');
            document.body.classList.add('hibs-launch-active');
            document.documentElement.classList.add('hibs-launch-boot');
            startTips();
            scheduleTryHide();
        }

        global.hibsShowLaunchOverlay = showLaunchOverlay;
        global.hibsHideLaunchOverlay = hideLaunchOverlay;

        var video = overlay.querySelector('.hibs-launch-video');
        var videoWrap = overlay.querySelector('.hibs-launch-video-wrap');
        if (video) {
            video.addEventListener('error', function () {
                video.classList.add('hibs-launch-video-off');
                if (videoWrap) videoWrap.classList.add('hibs-launch-video-off');
            });
        }

        function hasFixtureContent() {
            var root = document.getElementById('dash-fixture-root');
            if (!root) return false;
            return !!(
                root.querySelector('.fixture-card') ||
                root.querySelector('.fr-compact') ||
                root.querySelector('.empty-state')
            );
        }

        function shellReady() {
            return !!(
                document.querySelector('.dash-main') ||
                document.querySelector('.ref-page') ||
                document.querySelector('.settings-page') ||
                document.querySelector('.status-page') ||
                document.querySelector('.guide-page')
            );
        }

        function contentReady() {
            if (!shellReady()) return false;
            if (document.querySelector('.dash-main')) {
                return hasFixtureContent() || pageLoaded;
            }
            return true;
        }

        function scheduleTryHide() {
            if (hidden) return;
            if (hideTimer) global.clearTimeout(hideTimer);
            var elapsed = Date.now() - shownAt;
            var wait = elapsed >= MIN_DISPLAY_MS ? 32 : (MIN_DISPLAY_MS - elapsed + 16);
            hideTimer = global.setTimeout(tryHide, wait);
        }

        function tryHide() {
            if (hidden) return;
            if (document.readyState === 'loading') {
                scheduleTryHide();
                return;
            }
            if (Date.now() - shownAt < MIN_DISPLAY_MS) {
                scheduleTryHide();
                return;
            }
            if (!contentReady()) {
                scheduleTryHide();
                return;
            }
            hideLaunchOverlay();
        }

        startTips();
        global.addEventListener('load', function () {
            pageLoaded = true;
            tryHide();
        });
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', tryHide);
        } else {
            tryHide();
        }
        global.setTimeout(hideLaunchOverlay, 120000);
    })(window);
</script>
{% block extra_js %}{% endblock %}
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}hibs.bet{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #7CFC00; --green-dim: #4a9600; --dark: #080d1a;
            --card: rgba(8,14,30,0.96); --border: rgba(124,252,0,0.14);
            --glow: rgba(124,252,0,0.22); --gold: #FFD700;
            --gold-dim: rgba(255,215,0,0.12); --blue: #37ccff;
            --red: #ff3b3b; --text: #e4f0ff; --muted: #6a8ba8;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            background-image:
                radial-gradient(ellipse at 15% 50%, rgba(124,252,0,0.035) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 20%, rgba(55,204,255,0.035) 0%, transparent 55%);
            color: var(--text); min-height: 100vh; padding: 14px;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        header {
            background: rgba(4,8,20,0.97); border: 1px solid var(--border);
            border-radius: 18px; padding: 26px 32px; margin-bottom: 20px;
            box-shadow: 0 0 50px rgba(124,252,0,0.05), 0 18px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(18px); text-align: center; position: relative;
        }
        .brand-logo {
            font-family: 'Orbitron', monospace; font-size: 3em; font-weight: 900;
            color: var(--green); letter-spacing: 0.14em;
            text-shadow: 0 0 28px rgba(124,252,0,0.45), 0 0 60px rgba(124,252,0,0.15);
            display: block; margin-bottom: 4px;
        }
        .brand-tagline { color: var(--muted); font-size: 0.82em; letter-spacing: 0.1em; text-transform: uppercase; }
        .header-nav { position: absolute; top: 18px; right: 18px; display: flex; gap: 8px; }
        .header-nav a {
            background: rgba(124,252,0,0.07); color: var(--green); padding: 7px 14px;
            border-radius: 999px; text-decoration: none; font-size: 0.8em; font-weight: 700;
            border: 1px solid var(--border); transition: all 0.2s;
        }
        .header-nav a:hover { background: rgba(124,252,0,0.16); box-shadow: 0 0 10px var(--glow); }
        .stats-bar { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
        .stat-pill {
            background: rgba(124,252,0,0.06); border: 1px solid var(--border);
            border-radius: 999px; padding: 5px 14px; font-size: 0.8em; color: var(--green); font-weight: 600;
        }
        .stat-pill.gold { background: var(--gold-dim); border-color: rgba(255,215,0,0.28); color: var(--gold); }
        .tab-bar {
            display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 18px;
            background: rgba(4,8,20,0.85); border: 1px solid var(--border);
            border-radius: 12px; padding: 7px;
        }
        .tab-btn {
            padding: 7px 16px; border: 1px solid transparent; background: transparent;
            color: var(--muted); border-radius: 8px; cursor: pointer; font-size: 0.8em;
            font-weight: 600; transition: all 0.2s; font-family: 'Inter', sans-serif;
        }
        .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
        .tab-btn.active { background: rgba(124,252,0,0.1); color: var(--green); border-color: var(--border); }
        .tab-btn.gold-tab.active { background: var(--gold-dim); color: var(--gold); border-color: rgba(255,215,0,0.28); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .fixtures-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(370px, 1fr)); gap: 16px; }
        .fixture-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 16px;
            padding: 20px; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            position: relative; overflow: hidden;
        }
        .fixture-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--green), transparent); opacity: 0.35;
        }
        .fixture-card:hover { transform: translateY(-3px); box-shadow: 0 10px 35px rgba(0,0,0,0.4), 0 0 18px rgba(124,252,0,0.05); border-color: rgba(124,252,0,0.28); }
        .fixture-card.value-card { border-color: rgba(255,215,0,0.38); box-shadow: 0 0 18px rgba(255,215,0,0.07); }
        .fixture-card.value-card::before { background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.55; }
        .value-badge {
            position: absolute; top: 12px; right: 12px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000; font-size: 0.68em; font-weight: 800;
            padding: 3px 9px; border-radius: 999px; letter-spacing: 0.06em;
            text-transform: uppercase; box-shadow: 0 0 10px rgba(255,215,0,0.35);
        }
        .fixture-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .fixture-league {
            font-size: 0.72em; color: var(--blue); font-weight: 700;
            background: rgba(55,204,255,0.07); padding: 3px 9px; border-radius: 999px;
            border: 1px solid rgba(55,204,255,0.18); text-transform: uppercase; letter-spacing: 0.05em;
        }
        .fixture-time { font-size: 0.76em; color: var(--muted); font-weight: 600; }
        .match { display: flex; justify-content: space-between; align-items: center; margin: 14px 0; gap: 8px; }
        .team { flex: 1; text-align: center; }
        .team-name { font-weight: 700; font-size: 0.98em; color: var(--text); line-height: 1.3; }
        .vs { font-family: 'Orbitron', monospace; font-weight: 700; color: var(--green); font-size: 0.85em; opacity: 0.65; flex-shrink: 0; }
        .prob-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin: 10px 0; }
        .prob-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 9px; padding: 7px 5px; text-align: center; }
        .prob-box.best-outcome { border-color: var(--green); background: rgba(124,252,0,0.06); }
        .prob-box.best-outcome .prob-value { color: var(--green); }
        .prob-label { font-size: 0.65em; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.04em; }
        .prob-value { font-size: 1.05em; font-weight: 700; color: var(--text); }
        .prob-odds { font-size: 0.68em; color: var(--muted); margin-top: 2px; }
        .conf-bar-wrap { margin: 8px 0; }
        .conf-label { font-size: 0.68em; color: var(--muted); margin-bottom: 3px; display: flex; justify-content: space-between; }
        .conf-bar { height: 5px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; }
        .conf-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--green-dim), var(--green)); box-shadow: 0 0 6px var(--glow); }
        .value-bet-panel {
            background: linear-gradient(135deg, rgba(255,215,0,0.07), rgba(255,165,0,0.04));
            border: 1px solid rgba(255,215,0,0.28); border-radius: 10px; padding: 12px; margin: 10px 0;
        }
        .value-bet-title { font-size: 0.75em; font-weight: 800; color: var(--gold); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
        .value-bet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
        .vb-stat { font-size: 0.76em; }
        .vb-stat-label { color: var(--muted); font-size: 0.85em; }
        .vb-stat-value { color: var(--text); font-weight: 700; }
        .vb-stat-value.green { color: var(--green); }
        .vb-stat-value.gold { color: var(--gold); }
        .kelly-label { display: inline-block; padding: 2px 7px; border-radius: 999px; font-size: 0.7em; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .kelly-strong { background: rgba(124,252,0,0.13); color: var(--green); border: 1px solid rgba(124,252,0,0.28); }
        .kelly-moderate { background: rgba(55,204,255,0.1); color: var(--blue); border: 1px solid rgba(55,204,255,0.22); }
        .kelly-cautious { background: rgba(255,165,0,0.1); color: #FFA500; border: 1px solid rgba(255,165,0,0.22); }
        .kelly-skip { background: rgba(255,59,59,0.08); color: var(--red); border: 1px solid rgba(255,59,59,0.18); }
        .mini-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin: 8px 0; }
        .mini-stat { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.05); border-radius: 7px; padding: 7px 9px; font-size: 0.76em; }
        .mini-stat-label { color: var(--muted); font-size: 0.85em; margin-bottom: 2px; }
        .mini-stat-value { color: var(--text); font-weight: 700; }
        .dropdown { margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }
        .dropdown-toggle {
            width: 100%; background: rgba(124,252,0,0.05); border: 1px solid var(--border);
            color: var(--green); padding: 8px 12px; border-radius: 8px; cursor: pointer;
            font-size: 0.79em; font-weight: 700; font-family: 'Inter', sans-serif;
            transition: all 0.2s; text-align: left;
        }
        .dropdown-toggle:hover { background: rgba(124,252,0,0.1); }
        .dropdown-content { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
        .dropdown-content.open { max-height: 1400px; }
        .dropdown-inner { padding: 12px 0 2px; }
        .form-section { margin-bottom: 12px; }
        .form-section-title { font-size: 0.72em; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; font-weight: 700; }
        .form-strip { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 7px; }
        .form-dot { width: 24px; height: 24px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 0.7em; font-weight: 800; }
        .form-dot.W { background: rgba(124,252,0,0.18); color: var(--green); border: 1px solid rgba(124,252,0,0.28); }
        .form-dot.D { background: rgba(255,165,0,0.13); color: #FFA500; border: 1px solid rgba(255,165,0,0.22); }
        .form-dot.L { background: rgba(255,59,59,0.13); color: var(--red); border: 1px solid rgba(255,59,59,0.22); }
        .form-table { width: 100%; border-collapse: collapse; font-size: 0.73em; }
        .form-table th { color: var(--muted); font-weight: 600; padding: 3px 5px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .form-table td { padding: 4px 5px; border-bottom: 1px solid rgba(255,255,255,0.03); color: var(--text); }
        .form-table tr:last-child td { border-bottom: none; }
        .result-W { color: var(--green); font-weight: 700; }
        .result-D { color: #FFA500; font-weight: 700; }
        .result-L { color: var(--red); font-weight: 700; }
        .ha-badge { font-size: 0.78em; padding: 1px 4px; border-radius: 3px; }
        .ha-H { background: rgba(124,252,0,0.09); color: var(--green); }
        .ha-A { background: rgba(55,204,255,0.09); color: var(--blue); }
        .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
        .empty-state .icon { font-size: 2.5em; margin-bottom: 10px; }
        footer { text-align: center; color: var(--muted); margin-top: 36px; font-size: 0.78em; padding: 18px; border-top: 1px solid var(--border); }
        footer span { color: var(--green); font-weight: 700; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 3px; }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
<div class="container">
    {% block content %}{% endblock %}
    <footer><p><span>hibs.bet</span> &mdash; Edinburgh Betting Intelligence &nbsp;|&nbsp; Gamble Responsibly &nbsp;|&nbsp; 18+</p></footer>
</div>
<script>
    function toggleDropdown(btn) {
        const c = btn.nextElementSibling;
        c.classList.toggle('open');
        btn.textContent = c.classList.contains('open') ? '\u25bc Hide Details' : '\u25b6 Show Form & Details';
    }
    function switchTab(tabId, groupId) {
        document.querySelectorAll('[data-group="' + groupId + '"]').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('[data-tab-group="' + groupId + '"]').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>
{% block extra_js %}{% endblock %}
</body>
</html>

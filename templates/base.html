<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}hibs.bet{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hibs-neon:#7CFC00;
            --neon-value:#39ff14;
            --green:#94a3b8;
            --green-dim:#475569;
            --dark:#020617;
            --slate-900:#0f172a;
            --slate-800:#1e293b;
            --card:rgba(15,23,42,0.96);
            --border:rgba(148,163,184,0.14);
            --glow:rgba(57,255,20,0.12);
            --gold:#FFD700;
            --gold-dim:rgba(255,215,0,0.1);
            --blue:#38bdf8;
            --red:#f87171;
            --text:#f8fafc;
            --muted:#94a3b8;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Inter',sans-serif;
            background:var(--dark);
            background-image:
                radial-gradient(ellipse at 12% 40%,rgba(57,255,20,0.04) 0%,transparent 45%),
                radial-gradient(ellipse at 88% 8%,rgba(56,189,248,0.05) 0%,transparent 42%);
            color:var(--text);min-height:100vh;padding:10px;
        }
        .container{max-width:1400px;margin:0 auto;}

        /* HEADER */
        header{
            background:rgba(15,23,42,0.98);border:1px solid var(--border);
            border-radius:14px;padding:18px 24px;margin-bottom:0;
            box-shadow:0 12px 40px rgba(0,0,0,0.45);
            display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
        }
        .brand{display:flex;align-items:center;gap:14px;}
        .brand-logo{
            font-family:'Orbitron',monospace;font-size:2em;font-weight:900;
            color:var(--hibs-neon);letter-spacing:0.12em;
            text-shadow:0 0 24px rgba(124,252,0,0.35);
        }
        .brand-sub{font-size:0.75em;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;}
        .header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
        .stat-pill{
            background:rgba(148,163,184,0.08);border:1px solid var(--border);
            border-radius:999px;padding:4px 12px;font-size:0.76em;color:var(--text);font-weight:600;
        }
        .stat-pill.gold{background:rgba(57,255,20,0.08);border-color:rgba(57,255,20,0.35);color:var(--neon-value);}
        .nav-btn{
            background:rgba(148,163,184,0.08);color:var(--text);padding:6px 14px;
            border-radius:999px;text-decoration:none;font-size:0.78em;font-weight:700;
            border:1px solid var(--border);transition:all 0.2s;
        }
        .nav-btn:hover{background:rgba(56,189,248,0.12);border-color:rgba(56,189,248,0.35);}

        /* TABS */
        .tab-bar{
            display:flex;gap:4px;flex-wrap:wrap;margin-bottom:0;
            background:rgba(15,23,42,0.95);border:1px solid var(--border);
            border-radius:10px;padding:5px;
        }
        .tab-btn{
            padding:6px 14px;border:1px solid transparent;background:transparent;
            color:var(--muted);border-radius:7px;cursor:pointer;font-size:0.76em;
            font-weight:600;transition:all 0.2s;font-family:'Inter',sans-serif;
        }
        .tab-btn:hover{color:var(--text);background:rgba(248,250,252,0.04);}
        .tab-btn.active{background:rgba(56,189,248,0.1);color:var(--text);border-color:rgba(56,189,248,0.25);}
        .tab-btn.gold-tab.active{background:rgba(57,255,20,0.1);color:var(--neon-value);border-color:rgba(57,255,20,0.45);box-shadow:0 0 16px var(--glow);}
        .tab-panel{display:none;}
        .tab-panel.active{display:block;}

        /* GRID */
        .fixtures-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
            gap:10px;
        }

        /* CARD */
        .fixture-card{
            background:var(--card);border:1px solid var(--border);
            border-radius:12px;padding:14px;
            cursor:pointer;transition:border-color 0.2s,box-shadow 0.2s;
            position:relative;overflow:hidden;
        }
        .fixture-card::before{
            content:'';position:absolute;top:0;left:0;right:0;height:2px;
            background:linear-gradient(90deg,transparent,rgba(148,163,184,0.35),transparent);opacity:0.35;
        }
        .fixture-card:hover{border-color:rgba(148,163,184,0.28);box-shadow:0 6px 24px rgba(0,0,0,0.35);}
        .fixture-card.value-card{border-color:rgba(57,255,20,0.55);}
        .fixture-card.value-card::before{background:linear-gradient(90deg,transparent,var(--neon-value),transparent);opacity:0.85;}
        .fixture-card.value-multi{box-shadow:0 0 24px rgba(57,255,20,0.12);}
        .fixture-card.open .expand-panel{display:block;}

        /* VALUE BADGE */
        .value-badge{
            position:absolute;top:10px;right:10px;
            background:rgba(0,0,0,0.75);border:1px solid rgba(57,255,20,0.65);
            color:var(--neon-value);font-size:0.62em;font-weight:800;
            padding:2px 8px;border-radius:999px;letter-spacing:0.08em;
            box-shadow:0 0 14px rgba(57,255,20,0.35);
        }

        /* CARD TOP */
        .card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
        .league-pill{
            font-size:0.68em;color:var(--blue);font-weight:700;
            background:rgba(55,204,255,0.06);padding:2px 8px;
            border-radius:999px;border:1px solid rgba(55,204,255,0.15);
            text-transform:uppercase;letter-spacing:0.04em;
        }
        .kick-off{font-size:0.72em;color:var(--muted);font-weight:600;}

        /* TEAMS ROW */
        .teams-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:10px;}
        .team-block{}
        .team-right{text-align:right;}
        .team-nm{font-weight:700;font-size:0.92em;color:var(--text);line-height:1.2;margin-bottom:3px;}
        .team-meta{font-size:0.65em;color:var(--muted);margin-bottom:4px;}
        .form-dots{display:flex;gap:2px;flex-wrap:wrap;}
        .team-right .form-dots{justify-content:flex-end;}
        .form-dots-compact .fd{width:15px;height:15px;font-size:0.55em;}
        .fd{
            width:18px;height:18px;border-radius:4px;
            display:inline-flex;align-items:center;justify-content:center;
            font-size:0.6em;font-weight:800;
        }
        .fd-W{background:rgba(124,252,0,0.18);color:var(--green);border:1px solid rgba(124,252,0,0.3);}
        .fd-D{background:rgba(255,165,0,0.15);color:#FFA500;border:1px solid rgba(255,165,0,0.25);}
        .fd-L{background:rgba(255,68,68,0.15);color:var(--red);border:1px solid rgba(255,68,68,0.25);}

        /* ODDS TRIO */
        .score-col{display:flex;flex-direction:column;align-items:center;}
        .odds-trio{display:flex;gap:4px;}
        .odd-box{
            background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
            border-radius:7px;padding:5px 7px;text-align:center;min-width:44px;
        }
        .odd-box.best{border-color:rgba(57,255,20,0.45);background:rgba(57,255,20,0.06);}
        .odd-box.best .odd-val{color:var(--neon-value);}
        .odd-lbl{font-size:0.6em;color:var(--muted);font-weight:700;text-transform:uppercase;}
        .odd-val{font-size:0.95em;font-weight:700;color:var(--text);}
        .odd-pct{font-size:0.58em;color:var(--muted);margin-top:1px;}

        /* MARKET PILLS */
        .market-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
        .mpill{
            background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
            border-radius:6px;padding:3px 8px;font-size:0.68em;color:var(--muted);
        }
        .mpill strong{color:var(--text);}
        .mpill.conf strong{color:var(--blue);}
        .mpill.vbpill{background:rgba(57,255,20,0.08);border-color:rgba(57,255,20,0.35);color:var(--neon-value);font-weight:700;}

        /* EXPAND PANEL */
        .expand-panel{display:none;border-top:1px solid rgba(255,255,255,0.05);padding-top:12px;margin-top:10px;}

        /* SECTION TITLE */
        .section-title{font-size:0.68em;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;font-weight:700;margin-bottom:6px;}

        /* RESULT ROWS */
        .h2h-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
        .h2h-col{}
        .result-row{display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.72em;}
        .result-row:last-child{border-bottom:none;}
        .res-badge{width:18px;height:18px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:0.7em;font-weight:800;flex-shrink:0;}
        .res-W{background:rgba(124,252,0,0.18);color:var(--green);}
        .res-D{background:rgba(255,165,0,0.15);color:#FFA500;}
        .res-L{background:rgba(255,68,68,0.15);color:var(--red);}
        .res-ha{font-size:0.7em;padding:1px 3px;border-radius:3px;flex-shrink:0;}
        .ha-H{background:rgba(124,252,0,0.08);color:var(--green);}
        .ha-A{background:rgba(55,204,255,0.08);color:var(--blue);}
        .res-opp{flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .res-score{color:var(--text);font-weight:700;flex-shrink:0;}
        .res-date{color:var(--muted);flex-shrink:0;font-size:0.85em;}

        /* DATA TABLE */
        .data-table{width:100%;border-collapse:collapse;font-size:0.72em;margin-bottom:4px;}
        .data-table th{color:var(--muted);font-weight:600;padding:3px 5px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.05);}
        .data-table td{padding:4px 5px;border-bottom:1px solid rgba(255,255,255,0.03);}
        .data-table tr:last-child td{border-bottom:none;}
        .home-row td,.home-row{color:#86efac;}
        .away-row td,.away-row{color:var(--blue);}

        /* VALUE BET PANEL */
        .value-bet-panel{
            background:linear-gradient(135deg,rgba(255,215,0,0.07),rgba(255,165,0,0.04));
            border:1px solid rgba(255,215,0,0.25);border-radius:9px;padding:10px;
        }
        .value-bet-title{font-size:0.72em;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;}
        .vb-row{display:flex;gap:10px;flex-wrap:wrap;font-size:0.75em;}
        .green{color:var(--green);}
        .gold{color:var(--gold);}
        .kelly-label{display:inline-block;padding:2px 7px;border-radius:999px;font-size:0.7em;font-weight:700;text-transform:uppercase;}
        .kelly-strong{background:rgba(124,252,0,0.12);color:var(--green);border:1px solid rgba(124,252,0,0.25);}
        .kelly-moderate{background:rgba(55,204,255,0.09);color:var(--blue);border:1px solid rgba(55,204,255,0.2);}
        .kelly-cautious{background:rgba(255,165,0,0.09);color:#FFA500;border:1px solid rgba(255,165,0,0.2);}
        .kelly-skip{background:rgba(255,68,68,0.07);color:var(--red);border:1px solid rgba(255,68,68,0.15);}

        /* CONF BAR */
        .conf-bar-wrap{}
        .conf-label{font-size:0.65em;color:var(--muted);margin-bottom:3px;display:flex;justify-content:space-between;}
        .conf-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden;}
        .conf-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green-dim),var(--green));}

        /* FORM SUMMARY */
        .form-summary{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
        .fs-w{font-size:0.68em;font-weight:800;color:var(--green);background:rgba(124,252,0,0.1);border:1px solid rgba(124,252,0,0.2);padding:2px 7px;border-radius:5px;}
        .fs-d{font-size:0.68em;font-weight:800;color:#FFA500;background:rgba(255,165,0,0.1);border:1px solid rgba(255,165,0,0.2);padding:2px 7px;border-radius:5px;}
        .fs-l{font-size:0.68em;font-weight:800;color:var(--red);background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.2);padding:2px 7px;border-radius:5px;}
        .fs-stat{font-size:0.65em;color:var(--muted);background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);padding:2px 7px;border-radius:5px;}
        .form-strip{display:flex;gap:3px;flex-wrap:wrap;}
        .ha-badge{font-size:0.72em;padding:1px 4px;border-radius:3px;}
        .ha-H{background:rgba(124,252,0,0.09);color:var(--green);}
        .ha-A{background:rgba(55,204,255,0.09);color:var(--blue);}
        .result-W{color:var(--green);font-weight:700;}
        .result-D{color:#FFA500;font-weight:700;}
        .result-L{color:var(--red);font-weight:700;}
        .green{color:var(--green);}
        .gold{color:var(--gold);}
        .empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
        .empty-state .icon{font-size:2.2em;margin-bottom:8px;}

        .dash-outer{max-width:1720px;margin:0 auto;width:100%;}
        .dash-layout{display:grid;gap:16px;grid-template-columns:1fr;}
        @media (min-width:1024px){
            .dash-layout{grid-template-columns:minmax(252px,280px) minmax(0,1fr);align-items:start;}
            .dash-sidebar{
                position:sticky;top:12px;align-self:start;
                max-height:calc(100vh - 24px);overflow-y:auto;overflow-x:hidden;
                z-index:40;
                background:linear-gradient(180deg,rgba(15,23,42,0.99),rgba(2,6,23,0.97));
                border:1px solid var(--border);border-radius:14px;padding:14px 12px;
                box-shadow:0 12px 48px rgba(0,0,0,0.55);
            }
        }
        .dash-main{min-width:0;}
        .dash-side-brand{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);}
        .dash-side-brand .brand-logo{font-size:1.45em;display:block;letter-spacing:0.1em;}
        .dash-side-sub{font-size:0.68em;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:4px;}
        .dash-nav{margin-bottom:16px;}
        .dash-nav a{display:block;margin-bottom:8px;}
        .health-panel-title{font-size:0.68em;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;font-weight:700;margin-bottom:8px;}
        .health-grid{display:flex;flex-direction:column;gap:8px;}
        .health-row{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:0.72em;padding:6px 8px;border-radius:8px;background:rgba(2,6,23,0.5);border:1px solid rgba(148,163,184,0.1);}
        .health-name{color:var(--text);font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .health-meta{display:flex;align-items:center;gap:6px;flex-shrink:0;}
        .dot{width:10px;height:10px;border-radius:50%;background:#64748b;}
        .dot-pulse{background:var(--neon-value);box-shadow:0 0 0 0 rgba(57,255,20,0.55);animation:pulseDot 1.4s ease-out infinite;}
        .dot-warn{background:#fbbf24;}
        .dot-bad{background:#f87171;}
        @keyframes pulseDot{
            0%{box-shadow:0 0 0 0 rgba(57,255,20,0.5);}
            70%{box-shadow:0 0 0 8px rgba(57,255,20,0);}
            100%{box-shadow:0 0 0 0 rgba(57,255,20,0);}
        }
        .badge-layout{font-size:0.58em;font-weight:800;padding:2px 6px;border-radius:4px;background:#450a0a;color:#fecaca;border:1px solid #f87171;animation:flashRed 1.1s step-end infinite;}
        @keyframes flashRed{50%{opacity:0.35;}100%{opacity:1;}}
        .health-ms{color:var(--muted);font-variant-numeric:tabular-nums;}
        .sticky-stack{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,rgba(2,6,23,0.97) 70%,transparent);padding-top:4px;padding-bottom:10px;margin-bottom:10px;}
        .filter-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:10px 12px;border:1px solid var(--border);border-radius:12px;background:rgba(15,23,42,0.92);margin-bottom:10px;}
        .filter-toolbar label{font-size:0.72em;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px;}
        .filter-toolbar select{
            background:rgba(2,6,23,0.65);border:1px solid var(--border);color:var(--text);
            border-radius:8px;padding:6px 10px;font-size:0.78em;font-family:'Inter',sans-serif;min-width:200px;max-width:100%;
        }
        .filter-toolbar input[type=checkbox]{accent-color:var(--neon-value);width:16px;height:16px;}
        .value-highlight-strip{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
        .vh-pill{font-size:0.68em;font-weight:700;padding:4px 10px;border-radius:999px;background:rgba(57,255,20,0.08);border:1px solid rgba(57,255,20,0.35);color:var(--neon-value);}
        .vh-pill em{font-style:normal;color:var(--text);font-weight:600;margin-left:4px;}

        /* FOOTER */
        footer{text-align:center;color:var(--muted);margin-top:20px;font-size:0.72em;padding:14px;border-top:1px solid var(--border);}
        footer span{color:var(--hibs-neon);font-weight:700;}

        ::-webkit-scrollbar{width:4px;}
        ::-webkit-scrollbar-track{background:var(--dark);}
        ::-webkit-scrollbar-thumb{background:var(--green-dim);border-radius:2px;}

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
<div class="container{% block container_class %}{% endblock %}">
    {% block content %}{% endblock %}
    <footer><p><span>hibs.bet</span> &mdash; Edinburgh Betting Intelligence &nbsp;|&nbsp; Gamble Responsibly &nbsp;|&nbsp; 18+</p></footer>
</div>
<script>
    function toggleCard(card) {
        // Don't toggle if clicking a link or button inside
        card.classList.toggle('open');
    }
    function switchTab(evt, tabId, groupId) {
        document.querySelectorAll('[data-group="'+groupId+'"]').forEach(p=>p.classList.remove('active'));
        document.querySelectorAll('[data-tab-group="'+groupId+'"]').forEach(b=>b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        var t = evt && evt.currentTarget ? evt.currentTarget : (typeof event !== 'undefined' ? event.currentTarget : null);
        if (t) { t.classList.add('active'); }
        document.dispatchEvent(new CustomEvent('hibs-tab-change', { detail: { tabId: tabId, groupId: groupId } }));
    }
</script>
{% block extra_js %}{% endblock %}
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}hibs-bet{% endblock %}</title>
    <link rel="icon" href="/static/badge_harp_shield.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hibs-neon:#7CFC00;
            --neon-value:#39ff14;
            --green:#86efac;
            --green-dim:#475569;
            --dark:#020617;
            --slate-900:#0f172a;
            --slate-800:#1e293b;
            --card:rgba(15,23,42,0.96);
            --border:rgba(148,163,184,0.14);
            --glow:rgba(57,255,20,0.12);
            --gold:#FFD700;
            --gold-dim:rgba(255,215,0,0.1);
            --blue:#38bdf8;
            --red:#f87171;
            --text:#f8fafc;
            --muted:#94a3b8;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Inter',sans-serif;
            background:var(--dark);
            background-image:
                radial-gradient(ellipse at 12% 40%,rgba(57,255,20,0.07) 0%,transparent 48%),
                radial-gradient(ellipse at 88% 12%,rgba(124,252,0,0.06) 0%,transparent 44%),
                radial-gradient(ellipse at 50% 100%,rgba(34,197,94,0.04) 0%,transparent 55%);
            color:var(--text);min-height:100vh;padding:10px;
            position:relative;
        }
        body::before{
            content:'';
            position:fixed;
            inset:0;
            z-index:0;
            pointer-events:none;
            opacity:0.032;
            background:url('/static/hibs_badge.svg') repeat;
            background-size:100px 100px;
        }
        /* Hibs watermark: primary shield + heritage montage + individual crests (all assets in /static/). */
        body::after{
            content:'';
            position:fixed;
            inset:0;
            z-index:0;
            pointer-events:none;
            opacity:0.055;
            background-repeat:no-repeat;
            background-image:
                url('/static/badge_harp_shield.png'),
                url('/static/badges_heritage_montage.png'),
                url('/static/crest_variant_circle.png'),
                url('/static/crest_classic_fc.png'),
                url('/static/crest_official_circle.png');
            background-size:
                min(380px, 42vmin),
                min(340px, 52vw),
                min(100px, 15vmin),
                min(104px, 15vmin),
                min(104px, 15vmin);
            background-position:
                50% 40%,
                50% 88%,
                8% 88%,
                94% 10%,
                6% 10%;
            filter:drop-shadow(0 0 40px rgba(2,6,23,0.85));
        }
        @media(max-width:640px){
            body::after{
                opacity:0.04;
                background-size:
                    min(260px, 52vmin),
                    min(260px, 88vw),
                    min(72px, 18vmin),
                    min(76px, 18vmin),
                    min(76px, 18vmin);
                background-position:
                    50% 38%,
                    50% 92%,
                    4% 90%,
                    96% 6%,
                    4% 6%;
            }
        }
        .container{max-width:1400px;margin:0 auto;position:relative;z-index:1;}
        .dash-outer{position:relative;z-index:1;}

        /* HEADER */
        header{
            background:rgba(15,23,42,0.98);border:1px solid var(--border);
            border-radius:14px;padding:18px 24px;margin-bottom:0;
            box-shadow:0 12px 40px rgba(0,0,0,0.45);
            display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
        }
        .brand{display:flex;align-items:center;gap:14px;}
        .brand-logo{
            font-family:'Orbitron',monospace;font-size:2em;font-weight:900;
            color:var(--hibs-neon);letter-spacing:0.12em;
            text-shadow:0 0 24px rgba(124,252,0,0.35);
        }
        .brand-sub{font-size:0.75em;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;}
        .header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
        .stat-pill{
            background:rgba(148,163,184,0.08);border:1px solid var(--border);
            border-radius:999px;padding:4px 12px;font-size:0.76em;color:var(--text);font-weight:600;
        }
        .stat-pill.gold{background:rgba(57,255,20,0.08);border-color:rgba(57,255,20,0.35);color:var(--neon-value);}
        .nav-btn{
            background:rgba(148,163,184,0.08);color:var(--text);padding:6px 14px;
            border-radius:999px;text-decoration:none;font-size:0.78em;font-weight:700;
            border:1px solid var(--border);transition:all 0.2s;
        }
        .nav-btn:hover{background:rgba(57,255,20,0.1);border-color:rgba(124,252,0,0.35);}

        /* TABS */
        .tab-bar{
            display:flex;gap:4px;flex-wrap:wrap;margin-bottom:0;
            background:rgba(15,23,42,0.95);border:1px solid var(--border);
            border-radius:10px;padding:5px;
        }
        .tab-btn{
            padding:6px 14px;border:1px solid transparent;background:transparent;
            color:var(--muted);border-radius:7px;cursor:pointer;font-size:0.76em;
            font-weight:600;transition:all 0.2s;font-family:'Inter',sans-serif;
        }
        .tab-btn:hover{color:var(--text);background:rgba(248,250,252,0.04);}
        .tab-btn.active{background:rgba(57,255,20,0.1);color:var(--text);border-color:rgba(124,252,0,0.28);}
        .tab-btn.gold-tab.active{background:rgba(57,255,20,0.1);color:var(--neon-value);border-color:rgba(57,255,20,0.45);box-shadow:0 0 16px var(--glow);}
        .tab-panel{display:none;}
        .tab-panel.active{display:block;}
        .sub-tabs-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;padding:4px;background:rgba(2,6,23,0.5);border:1px solid var(--border);border-radius:8px;}
        .sub-tab{padding:5px 12px;border:1px solid transparent;background:transparent;color:var(--muted);border-radius:6px;cursor:pointer;font-size:0.72em;font-weight:700;font-family:'Inter',sans-serif;transition:all 0.2s;}
        .sub-tab:hover{color:var(--text);background:rgba(248,250,252,0.04);}
        .sub-tab.active{background:rgba(57,255,20,0.12);color:var(--neon-value);border-color:rgba(57,255,20,0.35);}
        .fr-menus{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
        .fr-pick-menu,.fr-league-snap{max-width:100%;min-width:0;flex:1 1 140px;font-size:0.62em;padding:3px 6px;border-radius:6px;border:1px solid rgba(148,163,184,0.25);background:rgba(2,6,23,0.75);color:var(--text);font-family:'Inter',sans-serif;}
        .fr-league-snap{flex:1 1 180px;}
        .hibs-assistant-fab{position:fixed;bottom:20px;right:20px;z-index:9999;width:52px;height:52px;border-radius:50%;border:2px solid rgba(57,255,20,0.55);background:linear-gradient(145deg,#14532d,#052e16);color:var(--neon-value);font-size:1.4em;cursor:pointer;box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 20px rgba(57,255,20,0.25);transition:transform 0.2s,box-shadow 0.2s;}
        .hibs-assistant-fab:hover{transform:scale(1.06);box-shadow:0 10px 36px rgba(0,0,0,0.55),0 0 28px rgba(57,255,20,0.4);}
        .hibs-assistant-panel{position:fixed;bottom:84px;right:20px;z-index:9999;width:min(380px,calc(100vw - 40px));max-height:min(70vh,520px);display:none;flex-direction:column;border-radius:14px;border:1px solid rgba(57,255,20,0.35);background:rgba(15,23,42,0.98);box-shadow:0 16px 48px rgba(0,0,0,0.55);overflow:hidden;}
        .hibs-assistant-panel.open{display:flex;}
        .hibs-assistant-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border);background:rgba(2,6,23,0.6);}
        .hibs-assistant-hd strong{font-family:'Orbitron',monospace;font-size:0.78em;color:var(--hibs-neon);}
        .hibs-assistant-close{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1.1em;padding:4px 8px;}
        .hibs-assistant-body{flex:1;overflow-y:auto;padding:10px 12px;font-size:0.78em;line-height:1.45;}
        .hibs-assistant-controls{padding:8px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;background:rgba(2,6,23,0.5);}
        .hibs-assistant-controls select,.hibs-assistant-controls button{font-size:0.72em;padding:6px 8px;border-radius:8px;border:1px solid var(--border);background:rgba(2,6,23,0.65);color:var(--text);font-family:'Inter',sans-serif;}
        .hibs-assistant-controls button{cursor:pointer;font-weight:700;color:var(--neon-value);border-color:rgba(57,255,20,0.35);}
        .hibs-assistant-controls button:hover{background:rgba(57,255,20,0.1);}
        .hibs-assistant-compose{display:flex;gap:6px;margin-top:6px;}
        .hibs-assistant-input{flex:1;min-width:0;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:rgba(2,6,23,0.65);color:var(--text);font-size:0.78em;font-family:'Inter',sans-serif;}
        .hibs-assistant-send{flex-shrink:0;padding:8px 12px;border-radius:8px;border:1px solid rgba(57,255,20,0.45);background:rgba(57,255,20,0.15);color:var(--neon-value);font-size:0.72em;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;}
        .hibs-assistant-send:disabled{opacity:0.5;cursor:wait;}
        .hibs-acca-legs{margin:6px 0 0 18px;padding:0;font-size:0.88em;}
        .hibs-acca-legs li{margin-bottom:4px;}
        .hibs-assistant-quick{display:flex;flex-wrap:wrap;gap:4px;}
        .hibs-assistant-quick{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
        .hibs-assistant-quick button{flex:1 1 auto;min-width:0;font-size:0.62em;padding:5px 6px;}
        .hibs-acca-legs{margin:6px 0 0 16px;padding:0;font-size:0.82em;line-height:1.35;}
        .hibs-acca-legs li{margin-bottom:4px;}
        .hibs-acca-card{border-color:rgba(57,255,20,0.22)!important;}
        .hibs-assistant-msg{margin-bottom:10px;padding:8px 10px;border-radius:8px;}
        .hibs-assistant-msg.bot{background:rgba(0,40,28,0.35);border:1px solid rgba(0,255,136,0.2);}
        .hibs-assistant-msg.user{background:rgba(57,255,20,0.08);border:1px solid rgba(124,252,0,0.22);text-align:right;}
        .hibs-assistant-card .ac-line{margin:0 0 4px;}
        .hibs-assistant-card ul{margin:4px 0 8px 16px;padding:0;}

        /* GRID */
        .fixtures-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
            gap:10px;
        }
        .fixtures-full-list{display:flex;flex-direction:column;gap:0;max-width:100%;}
        .league-drawer{
            border:1px solid var(--border);border-radius:12px;margin-bottom:10px;
            background:rgba(15,23,42,0.72);overflow:hidden;
        }
        .league-drawer-summary{
            cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;
            gap:10px;padding:11px 14px;font-weight:700;font-size:0.85em;background:rgba(2,6,23,0.55);
        }
        .league-drawer-summary::-webkit-details-marker{display:none;}
        .league-drawer[open] .league-drawer-summary{border-bottom:1px solid var(--border);}
        .league-drawer-title{display:flex;align-items:center;gap:8px;}
        .league-drawer-count{font-size:0.72em;color:var(--muted);font-weight:600;}
        .league-drawer-body{padding:10px 12px 12px;display:flex;flex-direction:column;gap:8px;}
        .api-missing-banner{
            margin:0 0 10px;padding:11px 14px;border-radius:10px;
            border:1px solid rgba(251,191,36,0.35);background:rgba(251,191,36,0.07);
            font-size:0.78em;line-height:1.45;color:var(--text);
        }
        .api-missing-banner code{font-size:0.88em;color:#fde68a;}

        /* —— Reference dashboard (hibs-bet) —— */
        .ref-page{max-width:1720px;margin:0 auto;position:relative;}
        .ref-page::after{
            content:'';position:absolute;left:0;right:0;bottom:0;height:min(42vh,520px);
            pointer-events:none;opacity:0.12;z-index:0;
            background:
                linear-gradient(to top, rgba(2,24,10,0.55) 0%, rgba(57,255,20,0.06) 35%, transparent 92%),
                url('/static/stadium_easter_road.png') center bottom / min(1200px, 100%) no-repeat;
            mask-image:linear-gradient(to top, #000 0%, transparent 92%);
            -webkit-mask-image:linear-gradient(to top, #000 0%, transparent 92%);
        }
        .ref-page > *{position:relative;z-index:1;}
        .site-top{
            display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
            padding:10px 4px 14px;border-bottom:1px solid var(--border);margin-bottom:12px;
            background:
                linear-gradient(180deg, rgba(15,23,42,0.55) 0%, transparent 100%),
                url('/static/badges_heritage_montage.png') right 8px center / 180px no-repeat;
        }
        .site-top-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
        .site-crest{flex-shrink:0;width:38px;height:38px;object-fit:contain;border-radius:10px;box-shadow:0 0 0 2px rgba(255,215,0,0.22);}
        .site-wordmark{font-family:'Orbitron',monospace;font-weight:900;font-size:1.15em;color:var(--hibs-neon);letter-spacing:0.08em;}
        .site-links{display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
        .site-link{font-size:0.72em;padding:5px 10px;border-radius:999px;color:var(--muted);text-decoration:none;font-weight:600;}
        .site-link:hover{color:var(--text);}
        .site-link-active{background:rgba(57,255,20,0.12);color:var(--neon-value);border:1px solid rgba(57,255,20,0.35);}
        .site-link-muted{opacity:0.45;cursor:default;}
        @media(max-width:900px){
            .site-top{background:linear-gradient(180deg, rgba(15,23,42,0.55) 0%, transparent 100%);}
        }
        .pill-soft{font-size:0.7em;color:var(--muted);display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;border:1px solid var(--border);}
        .odds-toggle{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
        .ot{background:rgba(2,6,23,0.6);border:none;color:var(--muted);padding:5px 12px;font-size:0.7em;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
        .ot-active{background:rgba(57,255,20,0.12);color:var(--neon-value);}
        .btn-refresh{background:rgba(57,255,20,0.15);border:1px solid rgba(57,255,20,0.45);color:var(--neon-value);padding:6px 14px;border-radius:8px;font-size:0.72em;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;}
        .btn-refresh:hover{filter:brightness(1.08);}
        .ref-cols{display:grid;grid-template-columns:minmax(0,1fr);gap:16px;align-items:start;}
        @media(min-width:1180px){.ref-cols.ref-cols-sidebar{grid-template-columns:minmax(220px,280px) minmax(0,1fr);}}
        .dash-sidebar{align-self:start;position:sticky;top:12px;z-index:2;}
        @media(max-width:1180px){.dash-sidebar{position:static;}}
        .dash-sidebar-inner{
            border:1px solid var(--border);border-radius:14px;padding:12px 12px 14px;
            background:rgba(15,23,42,0.96);box-shadow:0 8px 28px rgba(0,0,0,0.35);
        }
        .dash-side-hd{font-family:'Orbitron',monospace;font-size:0.72em;font-weight:800;color:var(--hibs-neon);letter-spacing:0.12em;text-transform:uppercase;margin:0 0 10px;}
        .dash-sidebar .search-chips{margin-bottom:10px;flex-direction:column;align-items:stretch;}
        .dash-sidebar .dash-search{max-width:none;width:100%;}
        .dash-sidebar .chip-row{max-height:220px;overflow-y:auto;padding-bottom:2px;}
        .dash-health-details{border:1px solid var(--border);border-radius:10px;margin-top:12px;background:rgba(2,6,23,0.45);}
        .dash-health-details > summary{cursor:pointer;padding:8px 10px;font-size:0.72em;font-weight:700;color:var(--muted);list-style:none;}
        .dash-health-details > summary::-webkit-details-marker{display:none;}
        .dash-health-details .health-grid-tight{padding:0 6px 8px;}
        .dash-h-row{font-size:0.68em;padding:5px 6px;}
        .dash-h-row .health-name{font-size:0.92em;}
        .btn-health-mini{width:100%;margin-top:8px;padding:6px 8px;border-radius:8px;border:1px solid var(--border);background:rgba(57,255,20,0.08);color:var(--text);font-size:0.68em;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
        .btn-health-mini:hover{border-color:rgba(124,252,0,0.35);}
        .hero-strip{margin-bottom:12px;}
        .hero-title{font-family:'Orbitron',monospace;font-size:clamp(1.1rem,2.4vw,1.45rem);font-weight:900;color:var(--text);letter-spacing:0.04em;}
        .hero-brand{color:var(--hibs-neon);}
        .hero-meta{font-size:0.8em;color:var(--muted);margin-top:6px;}
        .hero-sub{font-size:0.72em;color:var(--muted);margin-top:8px;max-width:52rem;line-height:1.45;opacity:0.92;}
        .live-pill{margin-left:8px;color:var(--neon-value);font-weight:700;font-size:0.85em;}
        .live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--neon-value);margin-right:5px;animation:pulseDot 1.4s ease-out infinite;}
        .search-chips{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:12px;}
        .dash-search{flex:1;min-width:180px;max-width:360px;background:rgba(2,6,23,0.55);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-size:0.82em;}
        .chk-inline{font-size:0.72em;color:var(--muted);display:flex;align-items:center;gap:6px;white-space:nowrap;}
        .chk-inline input{accent-color:var(--neon-value);}
        .chip-row{display:flex;flex-wrap:wrap;gap:6px;flex:1;}
        .chip-lg{font-size:0.68em;padding:5px 11px;border-radius:999px;border:1px solid var(--border);background:rgba(15,23,42,0.85);color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;}
        .chip-lg:hover{color:var(--text);}
        .chip-lg.active{background:rgba(57,255,20,0.12);color:var(--neon-value);border-color:rgba(57,255,20,0.4);}
        .chip-hint{width:100%;font-size:0.65em;color:var(--muted);line-height:1.35;margin:-4px 0 2px;}
        .acca-week-card{border:1px solid var(--border);border-radius:12px;background:rgba(15,23,42,0.75);margin-bottom:14px;overflow:hidden;}
        .acca-week-sum{cursor:pointer;list-style:none;display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:12px 14px;font-weight:700;font-size:0.82em;}
        .acca-week-sum::-webkit-details-marker{display:none;}
        .acca-week-ico{font-size:1.1em;}
        .acca-week-sub{margin-left:auto;font-size:0.68em;font-weight:500;color:var(--muted);}
        .acca-week-sub a{color:var(--blue);}
        .ai-pill{font-size:0.58em;font-weight:900;padding:2px 8px;border-radius:999px;background:linear-gradient(135deg,#22c55e,#15803d);color:#052e16;}
        .value-strip-title{font-size:0.72em;font-weight:800;color:var(--neon-value);letter-spacing:0.1em;margin:4px 0 8px;}
        .value-strip{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:16px;}
        @media(max-width:720px){.value-strip{grid-template-columns:1fr;}}
        .value-strip-card{
            border:1px solid rgba(255,215,0,0.45);border-radius:10px;padding:10px 12px;
            background:linear-gradient(145deg,rgba(255,215,0,0.12),rgba(15,23,42,0.5));
            box-shadow:0 0 16px rgba(255,215,0,0.12);
        }
        .vsc-meta{font-size:0.68em;color:var(--muted);margin-bottom:6px;}
        .vsc-vs{opacity:0.7;}
        .vsc-pick{font-weight:800;color:var(--text);font-size:0.88em;}
        .vsc-odds{font-size:1.05em;font-weight:900;color:var(--gold);margin:4px 0;}
        .vsc-edge{font-size:0.72em;color:var(--neon-value);font-weight:700;}
        .vsc-kelly{font-size:0.68em;color:var(--muted);margin-top:2px;}
        .day-block{margin-bottom:22px;padding-bottom:6px;border-bottom:1px solid rgba(148,163,184,0.12);}
        .day-block:last-child{border-bottom:none;margin-bottom:0;}
        .day-heading{font-size:1em;font-weight:800;margin:18px 0 10px;color:var(--text);letter-spacing:0.04em;}
        .lg-block{margin-bottom:14px;padding:10px 10px 6px;border:1px solid rgba(148,163,184,0.14);border-radius:12px;background:rgba(15,23,42,0.42);}
        .lg-heading{font-size:0.72em;font-weight:800;color:var(--hibs-neon);letter-spacing:0.14em;margin:0 0 8px;text-transform:uppercase;}
        .ft-scroll-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -2px;padding:0 2px 4px;}
        .ft-head,.fr-sum{
            display:grid;
            grid-template-columns:54px minmax(260px,1fr) repeat(9,56px) 26px;
            gap:4px;align-items:center;
            min-width:920px;
        }
        .ft-head{
            font-size:0.58em;font-weight:700;color:var(--muted);text-transform:uppercase;padding:4px 8px;border-bottom:1px solid rgba(255,255,255,0.06);
        }
        .ft-h-match{text-align:left;}
        .fr-compact{border-radius:8px;padding:0;margin-bottom:4px;border:1px solid rgba(255,255,255,0.06);background:rgba(15,23,42,0.55);}
        .fr-compact.value-card{
            border-color:rgba(255,215,0,0.5);
            background:linear-gradient(105deg,rgba(255,215,0,0.09) 0%,rgba(15,23,42,0.58) 42%);
            box-shadow:0 0 22px rgba(255,215,0,0.14),inset 0 1px 0 rgba(255,215,0,0.12);
        }
        .fr-compact.value-card.value-multi-many{box-shadow:0 0 28px rgba(255,215,0,0.2),inset 0 0 0 1px rgba(255,215,0,0.15);}
        .fr-value-strip{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
        .fr-value-box{
            display:inline-flex;align-items:center;gap:4px;flex-wrap:wrap;
            font-size:0.58em;font-weight:800;line-height:1.2;
            color:#1c1910;
            background:linear-gradient(145deg,#fde68a 0%,#fbbf24 55%,#f59e0b 100%);
            border:1px solid rgba(255,215,0,0.85);
            padding:3px 8px;border-radius:6px;
            box-shadow:0 0 14px rgba(251,191,36,0.4),0 1px 0 rgba(255,255,255,0.25) inset;
        }
        .fr-value-ico{font-size:0.95em;line-height:1;filter:drop-shadow(0 0 4px rgba(255,255,255,0.35));}
        .fr-value-lbl{font-weight:800;letter-spacing:0.02em;}
        .fr-value-odds{opacity:0.92;}
        .fr-value-edge{
            font-weight:900;color:#422006;
            background:rgba(0,0,0,0.12);padding:1px 5px;border-radius:4px;
        }
        .fr-value-more{background:rgba(255,215,0,0.15);color:var(--gold);border-color:rgba(255,215,0,0.45);}
        .fr-sum{
            padding:8px 8px;list-style:none;cursor:pointer;font-size:0.78em;position:relative;
        }
        .fr-sum::-webkit-details-marker{display:none;}
        .fr-ko{color:var(--muted);font-variant-numeric:tabular-nums;font-weight:600;}
        .fr-match{min-width:0;}
        .fr-l10-preview{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-top:5px;}
        .fr-l10-lbl{font-size:0.55em;font-weight:800;color:var(--muted);letter-spacing:0.06em;}
        .fr-l10-sep{opacity:0.45;font-size:0.65em;}
        .fr-teams{font-weight:700;color:var(--text);line-height:1.25;}
        .fr-vs{font-weight:500;color:var(--muted);margin:0 4px;}
        .fr-pred{font-size:0.72em;font-weight:700;margin-top:2px;}
        .fr-pred-home{color:#86efac;}
        .fr-pred-draw{color:#fdba74;}
        .fr-pred-away{color:#93c5fd;}
        .fr-od{display:block;min-width:0;text-align:center;font-variant-numeric:tabular-nums;font-weight:700;color:var(--text);padding:3px 2px;border-radius:5px;}
        .fr-chev{text-align:center;color:var(--muted);font-size:0.9em;}
        .fr-val-tag{
            position:absolute;top:6px;right:28px;z-index:2;
            font-size:0.58em;font-weight:900;letter-spacing:0.04em;
            color:#1c1910;
            background:linear-gradient(145deg,#fde68a,#fbbf24);
            border:1px solid rgba(255,215,0,0.9);
            padding:2px 8px;border-radius:999px;
            box-shadow:0 0 12px rgba(251,191,36,0.45);
        }
        .fr-od-value{
            color:#1c1910 !important;font-weight:900;
            background:linear-gradient(180deg,rgba(253,224,71,0.95),rgba(251,191,36,0.88));
            border-radius:5px;
            box-shadow:0 0 10px rgba(255,215,0,0.35),inset 0 0 0 1px rgba(255,255,255,0.35);
            position:relative;
        }
        .fr-od-value::after{
            content:'⚡';position:absolute;top:-7px;right:-4px;font-size:0.65em;
            line-height:1;text-shadow:0 0 6px rgba(255,255,255,0.6);
        }
        .fr-dq{font-size:0.55em;font-weight:800;padding:1px 6px;border-radius:4px;margin-top:4px;display:inline-block;letter-spacing:0.02em;}
        .fr-dq.ok{background:rgba(57,255,20,0.1);color:var(--neon-value);border:1px solid rgba(57,255,20,0.28);}
        .fr-dq.mid{background:rgba(251,191,36,0.08);color:#fde68a;border:1px solid rgba(251,191,36,0.28);}
        .fr-dq.low{background:rgba(248,113,113,0.10);color:#fecaca;border:1px solid rgba(248,113,113,0.22);}
        .acca-rail{position:sticky;top:12px;}
        .acca-rail-card{border:1px solid var(--border);border-radius:14px;padding:14px;background:rgba(15,23,42,0.95);box-shadow:0 12px 40px rgba(0,0,0,0.35);}
        .acca-rail-hd{font-family:'Orbitron',monospace;font-size:0.9em;color:var(--hibs-neon);font-weight:800;margin-bottom:10px;}
        .acca-rail-st{font-size:0.75em;color:var(--muted);margin-bottom:4px;}
        .acca-rail-empty{text-align:center;font-size:0.72em;color:var(--muted);padding:18px 8px;border:1px dashed rgba(148,163,184,0.2);border-radius:10px;margin:10px 0;}
        .acca-rail-lbl{display:block;font-size:0.65em;color:var(--muted);margin:8px 0 4px;font-weight:700;text-transform:uppercase;}
        .acca-rail-input{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:rgba(2,6,23,0.5);color:var(--text);font-size:0.85em;}
        .acca-rail-btn{display:block;text-align:center;margin-top:10px;padding:10px;border-radius:10px;background:linear-gradient(180deg,#22c55e,#15803d);color:#052e16;font-weight:900;font-size:0.82em;text-decoration:none;}
        .acca-rail-sec{width:100%;margin-top:8px;padding:8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:0.72em;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
        .acca-rail-books{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
        .book-pill{font-size:0.62em;padding:4px 8px;border-radius:6px;border:1px solid var(--border);color:var(--muted);}
        .rail-status-link{margin-top:12px;}
        .rail-health{margin-top:12px;border:1px solid var(--border);border-radius:10px;background:rgba(2,6,23,0.45);}
        .rail-health summary{cursor:pointer;padding:8px 10px;font-size:0.72em;font-weight:700;color:var(--muted);list-style:none;}
        .rail-health summary::-webkit-details-marker{display:none;}
        .health-grid-tight{padding:0 8px 8px;}
        .status-page{max-width:900px;margin:0 auto;}
        .status-hero{border-bottom:1px solid var(--border);padding:10px 4px 16px;margin-bottom:16px;}
        .status-hero h1{font-family:'Orbitron',monospace;font-size:1.25em;color:var(--hibs-neon);letter-spacing:0.06em;margin-bottom:6px;}
        .status-hero p{font-size:0.8em;color:var(--muted);line-height:1.5;}
        .status-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
        .status-btn{background:rgba(57,255,20,0.12);border:1px solid rgba(57,255,20,0.4);color:var(--neon-value);padding:6px 14px;border-radius:8px;font-size:0.75em;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;}
        .status-btn:hover{filter:brightness(1.08);}
        .status-section{margin-bottom:18px;}
        .status-section h2{font-size:0.72em;font-weight:800;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px;}
        .status-note{font-size:0.72em;color:var(--muted);margin-top:10px;line-height:1.45;}
        .status-err{font-size:0.68em;color:#fca5a5;margin-top:4px;font-weight:500;}

        /* CARD */
        .fixture-card{
            background:var(--card);border:1px solid var(--border);
            border-radius:12px;padding:14px;
            cursor:default;transition:border-color 0.2s,box-shadow 0.2s;
            position:relative;overflow:hidden;
        }
        .fixture-card>.fixture-summary{
            cursor:pointer;list-style:none;position:relative;padding-right:72px;
        }
        .fixture-card>.fixture-summary::-webkit-details-marker{display:none;}
        .fixture-card::before{
            content:'';position:absolute;top:0;left:0;right:0;height:2px;
            background:linear-gradient(90deg,transparent,rgba(148,163,184,0.35),transparent);opacity:0.35;
        }
        .fixture-card:hover{border-color:rgba(148,163,184,0.28);box-shadow:0 6px 24px rgba(0,0,0,0.35);}
        .fixture-card.value-card{border-color:rgba(255,215,0,0.55);}
        .fixture-card.value-card::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.9;}
        .fixture-card.value-multi{box-shadow:0 0 24px rgba(255,215,0,0.16);}
        .fixture-card[open] .expand-panel{display:block;}
        .fixture-card:not([open]) .expand-panel{display:none;}

        /* VALUE BADGE */
        .value-badge{
            position:absolute;top:10px;right:10px;
            background:rgba(0,0,0,0.75);border:1px solid rgba(57,255,20,0.65);
            color:var(--neon-value);font-size:0.62em;font-weight:800;
            padding:2px 8px;border-radius:999px;letter-spacing:0.08em;
            box-shadow:0 0 14px rgba(57,255,20,0.35);
        }

        /* CARD TOP */
        .card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
        .league-pill{
            font-size:0.68em;color:var(--blue);font-weight:700;
            background:rgba(55,204,255,0.06);padding:2px 8px;
            border-radius:999px;border:1px solid rgba(55,204,255,0.15);
            text-transform:uppercase;letter-spacing:0.04em;
        }
        .kick-off{font-size:0.72em;color:var(--muted);font-weight:600;}

        /* TEAMS ROW */
        .teams-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:10px;}
        .team-block{}
        .team-right{text-align:right;}
        .team-nm{font-weight:700;font-size:0.92em;color:var(--text);line-height:1.2;margin-bottom:3px;}
        .team-meta{font-size:0.65em;color:var(--muted);margin-bottom:4px;}
        .form-dots{display:flex;gap:2px;flex-wrap:wrap;}
        .team-right .form-dots{justify-content:flex-end;}
        .form-dots-compact .fd{width:15px;height:15px;font-size:0.55em;}
        .fd{
            width:18px;height:18px;border-radius:4px;
            display:inline-flex;align-items:center;justify-content:center;
            font-size:0.6em;font-weight:800;
        }
        .fd-W{background:rgba(124,252,0,0.18);color:var(--green);border:1px solid rgba(124,252,0,0.3);}
        .fd-D{background:rgba(255,165,0,0.15);color:#FFA500;border:1px solid rgba(255,165,0,0.25);}
        .fd-L{background:rgba(255,68,68,0.15);color:var(--red);border:1px solid rgba(255,68,68,0.25);}

        /* ODDS TRIO */
        .score-col{display:flex;flex-direction:column;align-items:center;}
        .odds-trio{display:flex;gap:4px;}
        .odd-box{
            background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
            border-radius:7px;padding:5px 7px;text-align:center;min-width:44px;
        }
        .odd-box.best{border-color:rgba(57,255,20,0.45);background:rgba(57,255,20,0.06);}
        .odd-box.best .odd-val{color:var(--neon-value);}
        .odd-lbl{font-size:0.6em;color:var(--muted);font-weight:700;text-transform:uppercase;}
        .odd-val{font-size:0.95em;font-weight:700;color:var(--text);}
        .odd-pct{font-size:0.58em;color:var(--muted);margin-top:1px;}

        /* MARKET PILLS */
        .market-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
        .mpill{
            background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
            border-radius:6px;padding:3px 8px;font-size:0.68em;color:var(--muted);
        }
        .mpill strong{color:var(--text);}
        .mpill.conf strong{color:var(--blue);}
        .mpill.vbpill{background:rgba(57,255,20,0.08);border-color:rgba(57,255,20,0.35);color:var(--neon-value);font-weight:700;}

        /* EXPAND PANEL */
        .expand-panel{border-top:1px solid rgba(255,255,255,0.05);padding-top:12px;margin-top:10px;}

        /* SECTION TITLE */
        .section-title{font-size:0.68em;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;font-weight:700;margin-bottom:6px;}

        /* RESULT ROWS */
        .h2h-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
        .h2h-col{}
        .result-row{display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.72em;}
        .result-row:last-child{border-bottom:none;}
        .res-badge{width:18px;height:18px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:0.7em;font-weight:800;flex-shrink:0;}
        .res-W{background:rgba(124,252,0,0.18);color:var(--green);}
        .res-D{background:rgba(255,165,0,0.15);color:#FFA500;}
        .res-L{background:rgba(255,68,68,0.15);color:var(--red);}
        .res-ha{font-size:0.7em;padding:1px 3px;border-radius:3px;flex-shrink:0;}
        .ha-H{background:rgba(124,252,0,0.08);color:var(--green);}
        .ha-A{background:rgba(55,204,255,0.08);color:var(--blue);}
        .res-opp{flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .res-score{color:var(--text);font-weight:700;flex-shrink:0;}
        .res-date{color:var(--muted);flex-shrink:0;font-size:0.85em;}

        /* DATA TABLE */
        .data-table{width:100%;border-collapse:collapse;font-size:0.72em;margin-bottom:4px;}
        .data-table th{color:var(--muted);font-weight:600;padding:3px 5px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.05);}
        .data-table td{padding:4px 5px;border-bottom:1px solid rgba(255,255,255,0.03);}
        .data-table tr:last-child td{border-bottom:none;}
        .home-row td,.home-row{color:#86efac;}
        .away-row td,.away-row{color:var(--blue);}

        /* VALUE BET PANEL */
        .value-bet-panel{
            background:linear-gradient(135deg,rgba(255,215,0,0.07),rgba(255,165,0,0.04));
            border:1px solid rgba(255,215,0,0.25);border-radius:9px;padding:10px;
        }
        .value-bet-title{font-size:0.72em;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;}
        .vb-row{display:flex;gap:10px;flex-wrap:wrap;font-size:0.75em;}
        .green{color:var(--green);}
        .gold{color:var(--gold);}
        .kelly-label{display:inline-block;padding:2px 7px;border-radius:999px;font-size:0.7em;font-weight:700;text-transform:uppercase;}
        .kelly-strong{background:rgba(124,252,0,0.12);color:var(--green);border:1px solid rgba(124,252,0,0.25);}
        .kelly-moderate{background:rgba(55,204,255,0.09);color:var(--blue);border:1px solid rgba(55,204,255,0.2);}
        .kelly-cautious{background:rgba(255,165,0,0.09);color:#FFA500;border:1px solid rgba(255,165,0,0.2);}
        .kelly-skip{background:rgba(255,68,68,0.07);color:var(--red);border:1px solid rgba(255,68,68,0.15);}

        /* CONF BAR */
        .conf-bar-wrap{}
        .conf-label{font-size:0.65em;color:var(--muted);margin-bottom:3px;display:flex;justify-content:space-between;}
        .conf-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden;}
        .conf-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green-dim),var(--green));}

        /* H/D/A OUTCOME BAR (old hibs.bet style) */
        .outcome-bar{display:flex;height:28px;border-radius:8px;overflow:hidden;font-size:0.68em;font-weight:700;line-height:28px;}
        .ob-seg{display:flex;align-items:center;justify-content:center;min-width:2.5em;white-space:nowrap;overflow:hidden;}
        .ob-h{background:var(--green);color:#0a0f0a;}
        .ob-d{background:rgba(255,255,255,0.12);color:var(--text);}
        .ob-a{background:var(--green);color:#0a0f0a;}

        /* FORM SUMMARY */
        .form-summary{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
        .fs-w{font-size:0.68em;font-weight:800;color:var(--green);background:rgba(124,252,0,0.1);border:1px solid rgba(124,252,0,0.2);padding:2px 7px;border-radius:5px;}
        .fs-d{font-size:0.68em;font-weight:800;color:#FFA500;background:rgba(255,165,0,0.1);border:1px solid rgba(255,165,0,0.2);padding:2px 7px;border-radius:5px;}
        .fs-l{font-size:0.68em;font-weight:800;color:var(--red);background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.2);padding:2px 7px;border-radius:5px;}
        .fs-stat{font-size:0.65em;color:var(--muted);background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);padding:2px 7px;border-radius:5px;}
        .form-strip{display:flex;gap:3px;flex-wrap:wrap;}
        .ha-badge{font-size:0.72em;padding:1px 4px;border-radius:3px;}
        .ha-H{background:rgba(124,252,0,0.09);color:var(--green);}
        .ha-A{background:rgba(55,204,255,0.09);color:var(--blue);}
        .result-W{color:var(--green);font-weight:700;}
        .result-D{color:#FFA500;font-weight:700;}
        .result-L{color:var(--red);font-weight:700;}
        .green{color:var(--green);}
        .gold{color:var(--gold);}
        .empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
        .empty-state .icon{font-size:2.2em;margin-bottom:8px;}

        .dash-outer{max-width:1720px;margin:0 auto;width:100%;}
        .dash-layout{display:grid;gap:16px;grid-template-columns:1fr;}
        @media (min-width:1024px){
            .dash-layout{grid-template-columns:minmax(252px,280px) minmax(0,1fr);align-items:start;}
            .dash-sidebar{
                position:sticky;top:12px;align-self:start;
                max-height:calc(100vh - 24px);overflow-y:auto;overflow-x:hidden;
                z-index:40;
                background:linear-gradient(180deg,rgba(15,23,42,0.99),rgba(2,6,23,0.97));
                border:1px solid var(--border);border-radius:14px;padding:14px 12px;
                box-shadow:0 12px 48px rgba(0,0,0,0.55);
            }
        }
        .dash-main{min-width:0;}
        .dash-sidebar-filters{margin-bottom:10px;}
        .dash-upcoming{display:flex;flex-direction:column;gap:2px;max-height:min(58vh,640px);overflow-y:auto;margin-top:8px;padding-right:2px;}
        .du-day{font-size:0.62em;font-weight:800;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin:10px 0 4px;padding-top:4px;border-top:1px solid rgba(148,163,184,0.12);}
        .du-day:first-child{border-top:none;margin-top:0;padding-top:0;}
        .du-row{display:grid;grid-template-columns:42px minmax(0,1fr);gap:6px;align-items:start;padding:5px 6px;border-radius:8px;text-decoration:none;color:var(--text);font-size:0.72em;line-height:1.3;}
        .du-row:hover{background:rgba(57,255,20,0.08);color:var(--neon-value);}
        .du-ko{font-variant-numeric:tabular-nums;font-weight:700;color:var(--muted);}
        .du-teams{min-width:0;word-break:break-word;}
        .du-vs{color:var(--muted);margin:0 2px;}
        .du-empty,.du-hint{font-size:0.68em;color:var(--muted);margin:8px 0 0;}
        .lg-count{font-weight:600;opacity:0.65;}
        .fixture-card.fixture-highlight{outline:2px solid rgba(57,255,20,0.55);box-shadow:0 0 0 4px rgba(57,255,20,0.12);}
        .dash-side-brand{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);}
        .dash-side-brand .brand-logo{font-size:1.45em;display:block;letter-spacing:0.1em;}
        .dash-side-sub{font-size:0.68em;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:4px;}
        .dash-nav{margin-bottom:16px;}
        .dash-nav a{display:block;margin-bottom:8px;}
        .health-panel-title{font-size:0.68em;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;font-weight:700;margin-bottom:8px;}
        .health-grid{display:flex;flex-direction:column;gap:8px;}
        .health-row{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:0.72em;padding:6px 8px;border-radius:8px;background:rgba(2,6,23,0.5);border:1px solid rgba(148,163,184,0.1);}
        .health-name{color:var(--text);font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .health-meta{display:flex;align-items:center;gap:6px;flex-shrink:0;}
        .dot{width:10px;height:10px;border-radius:50%;background:#64748b;}
        .dot-pulse{background:var(--neon-value);box-shadow:0 0 0 0 rgba(57,255,20,0.55);animation:pulseDot 1.4s ease-out infinite;}
        .dot-warn{background:#fbbf24;}
        .dot-bad{background:#f87171;}
        @keyframes pulseDot{
            0%{box-shadow:0 0 0 0 rgba(57,255,20,0.5);}
            70%{box-shadow:0 0 0 8px rgba(57,255,20,0);}
            100%{box-shadow:0 0 0 0 rgba(57,255,20,0);}
        }
        .badge-layout{font-size:0.58em;font-weight:800;padding:2px 6px;border-radius:4px;background:#450a0a;color:#fecaca;border:1px solid #f87171;animation:flashRed 1.1s step-end infinite;}
        @keyframes flashRed{50%{opacity:0.35;}100%{opacity:1;}}
        .health-ms{color:var(--muted);font-variant-numeric:tabular-nums;}
        .sticky-stack{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,rgba(2,18,10,0.97) 70%,transparent);padding-top:4px;padding-bottom:10px;margin-bottom:10px;}
        .filter-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:10px 12px;border:1px solid var(--border);border-radius:12px;background:rgba(15,23,42,0.92);margin-bottom:10px;}
        .filter-toolbar label{font-size:0.72em;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px;}
        .filter-toolbar select{
            background:rgba(2,6,23,0.65);border:1px solid var(--border);color:var(--text);
            border-radius:8px;padding:6px 10px;font-size:0.78em;font-family:'Inter',sans-serif;min-width:200px;max-width:100%;
        }
        .filter-toolbar input[type=checkbox]{accent-color:var(--neon-value);width:16px;height:16px;}
        .value-highlight-strip{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
        .vh-pill{font-size:0.68em;font-weight:700;padding:4px 10px;border-radius:999px;background:rgba(57,255,20,0.08);border:1px solid rgba(57,255,20,0.35);color:var(--neon-value);}
        .vh-pill em{font-style:normal;color:var(--text);font-weight:600;margin-left:4px;}

        /* BETTING GUIDE */
        .betting-guide{border:1px solid var(--border);border-radius:12px;margin-bottom:14px;background:rgba(15,23,42,0.85);}
        .betting-guide-sum{cursor:pointer;padding:10px 14px;font-size:0.78em;font-weight:700;color:var(--hibs-neon);list-style:none;}
        .betting-guide-sum::-webkit-details-marker{display:none;}
        .betting-guide-body{padding:0 14px 14px;font-size:0.76em;line-height:1.5;color:var(--text);}
        .betting-guide-body p{margin:0 0 8px;color:var(--muted);}
        .betting-guide-body p strong{color:var(--text);}
        .betting-guide-list{margin:6px 0 8px 18px;padding:0;}
        .betting-guide-note{font-size:0.68em;margin:0;}
        .vsc-kelly[title]{cursor:help;border-bottom:1px dotted var(--muted);}

        /* BETSLIP DRAWER */
        .btn-betslip{background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.35);color:var(--gold);padding:6px 12px;border-radius:8px;font-size:0.72em;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;}
        .btn-betslip:hover{filter:brightness(1.1);}
        .betslip-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9990;opacity:0;pointer-events:none;transition:opacity 0.25s;}
        .betslip-backdrop.open{opacity:1;pointer-events:auto;}
        .betslip-drawer{position:fixed;top:0;right:0;width:min(360px,100vw);height:100vh;z-index:9991;background:rgba(15,23,42,0.98);border-left:1px solid var(--border);box-shadow:-12px 0 40px rgba(0,0,0,0.5);transform:translateX(100%);transition:transform 0.28s ease;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
        .betslip-drawer.open{transform:translateX(0);}
        .betslip-drawer-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
        .betslip-drawer-title{font-family:'Orbitron',monospace;font-size:0.95em;color:var(--gold);margin:0;}
        .betslip-drawer-close{background:transparent;border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1em;}
        .betslip-drawer-hint{font-size:0.68em;color:var(--muted);margin:0;line-height:1.4;}
        .betslip-drawer-hint a{color:var(--neon-value);}
        .betslip-drawer-stats{display:flex;justify-content:space-between;font-size:0.75em;color:var(--muted);}
        .betslip-drawer-lbl{font-size:0.65em;color:var(--muted);font-weight:700;text-transform:uppercase;}
        .betslip-drawer-stake{width:100%;padding:8px;border-radius:8px;border:1px solid var(--border);background:rgba(2,6,23,0.6);color:var(--text);}
        .betslip-drawer-ret{font-size:0.75em;color:var(--muted);margin:0;}
        .betslip-drawer-body{flex:1;min-height:80px;}
        .betslip-drawer-empty{font-size:0.72em;color:var(--muted);text-align:center;padding:20px 8px;border:1px dashed var(--border);border-radius:10px;}
        .betslip-leg{position:relative;padding:10px 28px 10px 10px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:rgba(2,6,23,0.5);}
        .betslip-leg-rm{position:absolute;top:8px;right:8px;border:none;background:rgba(255,68,68,0.15);color:var(--red);width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:0.7em;}
        .betslip-leg-meta{font-size:0.62em;color:var(--muted);margin-bottom:4px;}
        .betslip-leg-row{display:flex;justify-content:space-between;align-items:center;}
        .betslip-leg-pick{font-size:0.78em;font-weight:700;color:var(--green);}
        .betslip-leg-odds{font-size:0.9em;font-weight:800;color:var(--gold);}
        .betslip-drawer-btn-primary{display:block;text-align:center;padding:11px;border-radius:10px;background:linear-gradient(180deg,#22c55e,#15803d);color:#052e16;font-weight:900;text-decoration:none;font-size:0.82em;}
        .betslip-drawer-btn-sec{width:100%;padding:8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.72em;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
        .betslip-fab{position:fixed;bottom:20px;right:82px;z-index:9998;width:52px;height:52px;border-radius:50%;border:2px solid rgba(255,215,0,0.45);background:linear-gradient(145deg,#422006,#1c1917);color:var(--gold);font-size:1.1em;cursor:pointer;box-shadow:0 8px 28px rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;gap:2px;}
        .betslip-fab-count{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;padding:0 4px;border-radius:999px;background:var(--gold);color:#000;font-size:0.65em;font-weight:800;align-items:center;justify-content:center;}
        .fr-add-slip{font-size:0.62em;padding:3px 8px;border-radius:6px;border:1px solid rgba(255,215,0,0.35);background:rgba(255,215,0,0.08);color:var(--gold);cursor:pointer;font-weight:700;font-family:'Inter',sans-serif;}

        /* FOOTER */
        footer{text-align:center;color:var(--muted);margin-top:20px;font-size:0.72em;padding:14px;border-top:1px solid var(--border);}
        footer span{color:var(--hibs-neon);font-weight:700;}

        ::-webkit-scrollbar{width:4px;}
        ::-webkit-scrollbar-track{background:var(--dark);}
        ::-webkit-scrollbar-thumb{background:var(--green-dim);border-radius:2px;}

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
<div class="container{% block container_class %}{% endblock %}">
    {% block content %}{% endblock %}
    <footer><p><span>hibs-bet</span> &mdash; Edinburgh Betting Intelligence &nbsp;|&nbsp; Gamble Responsibly &nbsp;|&nbsp; 18+</p></footer>
</div>
{% include '_betslip_drawer.html' %}
<script src="{{ url_for('static', filename='hibs_betslip.js') }}"></script>
<script>
    function toggleCard(card) {
        card.classList.toggle('open');
    }
    function switchTab(evt, tabId, groupId) {
        document.querySelectorAll('[data-group="'+groupId+'"]').forEach(p=>p.classList.remove('active'));
        document.querySelectorAll('[data-tab-group="'+groupId+'"]').forEach(b=>b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        var t = evt && evt.currentTarget ? evt.currentTarget : (typeof event !== 'undefined' ? event.currentTarget : null);
        if (t) { t.classList.add('active'); }
        document.dispatchEvent(new CustomEvent('hibs-tab-change', { detail: { tabId: tabId, groupId: groupId } }));
    }
</script>
{% block extra_js %}{% endblock %}
</body>
</html>

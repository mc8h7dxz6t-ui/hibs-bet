<details class="sky-news-card" id="sky-sports-news" open>
    <summary class="sky-news-sum">
        <span class="sky-news-ico" aria-hidden="true">📺</span>
        <span class="sky-news-txt">Sky Sports on YouTube (free)</span>
        <span class="sky-news-sub">News 24/7 · Football clips</span>
    </summary>
    <div class="sky-news-body">
        <p class="sky-news-note muted small">
            Official <strong>Sky Sports News</strong> 24/7 and <strong>Sky Sports Football</strong> clips on YouTube — not Sky Go or a Sky subscription.
        </p>
        <div class="sky-news-tabs tab-row" role="tablist" aria-label="Sky Sports on YouTube">
            <button type="button" class="tab-btn active" data-tab-group="sky-media" onclick="switchTab(event,'sky-tab-news','sky-media')">News live</button>
            <button type="button" class="tab-btn" data-tab-group="sky-media" onclick="switchTab(event,'sky-tab-football','sky-media')">Football clips</button>
        </div>
        <div id="sky-tab-news" class="tab-panel active sky-news-player-wrap" data-group="sky-media">
            <iframe
                class="sky-news-iframe sky-news-iframe-live"
                title="Sky Sports News — official YouTube 24/7 live"
                src="{{ sky_sports_news_live_embed_url }}"
                loading="lazy"
                referrerpolicy="strict-origin-when-cross-origin"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen
            ></iframe>
        </div>
        <div id="sky-tab-football" class="tab-panel sky-news-player-wrap" data-group="sky-media">
            <iframe
                class="sky-news-iframe"
                title="Sky Sports Football — official YouTube clips"
                src="{{ sky_sports_football_clips_embed_url }}"
                loading="lazy"
                referrerpolicy="strict-origin-when-cross-origin"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen
            ></iframe>
        </div>
        <p class="sky-news-embed-hint muted small">
            If a player is blank, switch tabs or open
            <a href="{{ sky_sports_news_youtube_live_video_url }}" target="_blank" rel="noopener noreferrer">News on YouTube</a>
            ·
            <a href="{{ sky_sports_news_youtube_channel_url }}" target="_blank" rel="noopener noreferrer">@SkySportsNews</a>.
        </p>
    </div>
</details>

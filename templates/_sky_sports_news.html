<details class="sky-watch-card" id="sky-sports-news" open>
    <summary class="sky-watch-sum">
        <span class="sky-watch-ico" aria-hidden="true">📺</span>
        <span class="sky-watch-txt">Watch</span>
        <span class="sky-watch-sub">Sky Sports News · Football on YouTube</span>
    </summary>
    <div class="sky-watch-body">
        <p class="sky-watch-note muted small">
            Preset YouTube embed in browser-style chrome — not Safari/Chrome or Sky Go.
        </p>
        <div class="sky-browser" id="sky-browser">
            <div class="sky-browser-toolbar" role="toolbar" aria-label="Preset YouTube browser">
                <button type="button" class="sky-browser-back" id="sky-browser-back" title="Previous preset" aria-label="Previous preset">←</button>
                <label class="visually-hidden" for="sky-browser-url">Current preset URL</label>
                <input
                    type="text"
                    class="sky-browser-url"
                    id="sky-browser-url"
                    readonly
                    value="{{ sky_sports_news_preset_url }}"
                    aria-readonly="true"
                />
                <a
                    href="{{ sky_sports_news_open_url }}"
                    id="sky-browser-open"
                    class="sky-browser-open"
                    target="_blank"
                    rel="noopener noreferrer"
                >Open in browser ↗</a>
            </div>
            <div class="sky-browser-tabs tab-row" role="tablist" aria-label="Sky Sports YouTube presets">
                <button
                    type="button"
                    class="tab-btn active"
                    data-tab-group="sky-media"
                    data-sky-tab="sky-tab-news"
                    data-sky-preset-url="{{ sky_sports_news_preset_url }}"
                    data-sky-open-url="{{ sky_sports_news_open_url }}"
                    onclick="switchTab(event,'sky-tab-news','sky-media')"
                >Sky Sports News 24/7</button>
                <button
                    type="button"
                    class="tab-btn"
                    data-tab-group="sky-media"
                    data-sky-tab="sky-tab-football"
                    data-sky-preset-url="{{ sky_sports_football_preset_url }}"
                    data-sky-open-url="{{ sky_sports_football_open_url }}"
                    onclick="switchTab(event,'sky-tab-football','sky-media')"
                >Sky Sports Football</button>
            </div>
            <div id="sky-tab-news" class="tab-panel active sky-browser-viewport" data-group="sky-media">
                <iframe
                    class="sky-browser-iframe"
                    title="Sky Sports News 24/7 — YouTube embed"
                    src="{{ sky_sports_news_live_embed_url }}"
                    loading="lazy"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen
                ></iframe>
            </div>
            <div id="sky-tab-football" class="tab-panel sky-browser-viewport" data-group="sky-media">
                <iframe
                    class="sky-browser-iframe"
                    title="Sky Sports Football — YouTube embed"
                    src="{{ sky_sports_football_clips_embed_url }}"
                    loading="lazy"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen
                ></iframe>
            </div>
        </div>
    </div>
</details>
<script>
(function () {
    var root = document.getElementById('sky-browser');
    if (!root) return;
    var urlEl = document.getElementById('sky-browser-url');
    var openEl = document.getElementById('sky-browser-open');
    var backBtn = document.getElementById('sky-browser-back');
    var tabOrder = ['sky-tab-news', 'sky-tab-football'];

    function applyPreset(btn) {
        if (!btn) return;
        if (urlEl && btn.dataset.skyPresetUrl) urlEl.value = btn.dataset.skyPresetUrl;
        if (openEl && btn.dataset.skyOpenUrl) openEl.href = btn.dataset.skyOpenUrl;
    }

    document.addEventListener('hibs-tab-change', function (e) {
        if (!e.detail || e.detail.groupId !== 'sky-media') return;
        var btn = root.querySelector('[data-sky-tab="' + e.detail.tabId + '"]');
        applyPreset(btn);
    });

    if (backBtn) {
        backBtn.addEventListener('click', function () {
            var active = root.querySelector('[data-tab-group="sky-media"].active');
            var idx = active ? tabOrder.indexOf(active.dataset.skyTab) : 0;
            var prev = tabOrder[(idx <= 0 ? tabOrder.length : idx) - 1];
            var btn = root.querySelector('[data-sky-tab="' + prev + '"]');
            if (btn) btn.click();
        });
    }
})();
</script>

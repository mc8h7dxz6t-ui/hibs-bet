<details class="sky-news-card" id="sky-sports-news" open>
    <summary class="sky-news-sum">
        <span class="sky-news-ico" aria-hidden="true">📺</span>
        <span class="sky-news-txt">Sky Sports Football</span>
        <span class="sky-news-sub">Official YouTube · Sky player</span>
    </summary>
    <div class="sky-news-body">
        <p class="sky-news-note muted small">
            Recent official clips from <strong>Sky Sports Football</strong> on YouTube play below.
            For the full Sky Sports News TV player, use Sky’s site.
        </p>
        <div class="sky-news-actions sky-news-actions-primary">
            <a href="{{ sky_sports_news_watch_url }}" class="nav-btn sky-news-watch-live" target="_blank" rel="noopener noreferrer">
                Watch live on Sky Sports
            </a>
        </div>
        <div class="sky-news-player-wrap">
            <iframe
                class="sky-news-iframe"
                title="Sky Sports Football — official YouTube clips"
                src="{{ sky_sports_news_embed_url }}"
                loading="lazy"
                referrerpolicy="strict-origin-when-cross-origin"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen
            ></iframe>
        </div>
        <p class="sky-news-embed-hint muted small">
            Official <strong>Sky Sports Football</strong> YouTube uploads. If the player is blank, open Sky Sports above.
        </p>
    </div>
</details>

# Reverse proxy for hibs-bet (gunicorn on 127.0.0.1:8000).
# Install:
#   sudo cp deploy/hibs-bet.nginx.conf /etc/nginx/sites-available/hibs-bet
#   sudo ln -sf /etc/nginx/sites-available/hibs-bet /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d hibs-bet.co.uk -d www.hibs-bet.co.uk
#
# If certbot already configured SSL, re-run apply-vps-production-tuning.sh to add timeouts only.

server {
    listen 80;
    server_name hibs-bet.co.uk www.hibs-bet.co.uk;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# hibs-bet — GitLab CI: tests on every branch; production deploy on default branch after tests.
# Full setup: deploy/GITLAB_DEPLOY.md
#
# --- GitLab CI/CD variables (Settings → CI/CD → Variables) ---
#   SSH_PRIVATE_KEY   File or variable: private key for DEPLOY_USER (PEM, include BEGIN/END lines).
#   DEPLOY_HOST       VPS hostname or IP (e.g. 203.0.113.10 or vps.example.com).
#   DEPLOY_USER       SSH user (must have pull rights to this repo and passwordless sudo for systemctl).
#   DEPLOY_PATH       Absolute path to the git clone on the server (repo root; contains src/, requirements.txt).
#
# Optional:
#   SSH_KNOWN_HOSTS   If set, written to ~/.ssh/known_hosts (recommended). Generate: ssh-keyscan -H your.host
#
# Server setup (once):
#   - mkdir -p DEPLOY_PATH; copy .env (never commit). Git clone optional — CI rsyncs the repo.
#   - python3 -m venv DEPLOY_PATH/.venv && pip install -r requirements.txt
#   - Copy deploy/hibs-bet.service → /etc/systemd/system/hibs-bet.service (edit paths/user), daemon-reload, enable.
#   - Create DEPLOY_PATH/.env with API keys etc. Never commit .env (already in .gitignore).
#   - DEPLOY_USER must be able to `git pull` in DEPLOY_PATH (deploy key or HTTPS credential on server).
#   - Passwordless sudo for: systemctl restart hibs-bet.service (or run the pip/git parts as a user without systemd and adjust).
#
# https://docs.gitlab.com/ee/ci/yaml/

image: python:3.12-bookworm

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONPATH: "src"
  DEPLOY_PATH: "/opt/hibs-bet"

stages:
  - test
  - deploy

cache:
  paths:
    - .cache/pip

before_script:
  - python --version
  - pip install --upgrade pip
  - pip install -r requirements.txt

test:
  stage: test
  script:
    - python test_app.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

deploy_production:
  stage: deploy
  needs: ["test"]
  image: python:3.12-bookworm
  before_script:
    - apt-get update -qq && apt-get install -qqy openssh-client rsync
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - |
      if [ -n "${SSH_KNOWN_HOSTS:-}" ]; then
        echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
      else
        ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      fi
    - chmod 644 ~/.ssh/known_hosts
    - eval "$(ssh-agent -s)"
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
  script:
    - bash scripts/deploy_ci_from_runner.sh
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
